version: '3.9'
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kongger_db
      POSTGRES_USER: kongger_user
      POSTGRES_PASSWORD: ${PG_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U kongger_user -d kongger_db"]
      interval: 5s
      retries: 10

  api:
    build: .
    ports: ["3001:3001"]
    environment:
      PG_CONNECTION_STRING: postgresql://kongger_user:${PG_PASSWORD:-changeme}@db:5432/kongger_db
      JWT_SECRET: ${JWT_SECRET:-dev_secret_change_in_prod_32chars}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
