version: "3.9"

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: ai_one
      POSTGRES_USER: ai_one
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ai_one_secret}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_one"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://ai_one:${POSTGRES_PASSWORD:-ai_one_secret}@postgres:5432/ai_one
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-ai-one-jwt-secret-change-me}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: always

volumes:
  pg_data:
