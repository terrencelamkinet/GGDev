version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: kongger_db
      POSTGRES_USER: kongger_user
      POSTGRES_PASSWORD: ${PG_PASSWORD:-kongger_dev_pass}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kongger_user -d kongger_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PG_CONNECTION_STRING: postgresql://kongger_user:${PG_PASSWORD:-kongger_dev_pass}@postgres:5432/kongger_db
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production}
      PORT: 3001
    ports:
      - "3001:3001"

volumes:
  pg_data:
