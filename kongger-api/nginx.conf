# KONGGER Nginx Production Config
# Place at: /etc/nginx/sites-available/kongger
# Enable:   ln -sf /etc/nginx/sites-available/kongger /etc/nginx/sites-enabled/

upstream kongger_api {
    server 127.0.0.1:3001;
    keepalive 64;
}

server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    root /var/www/kongger;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        location ~* \.(css|js|woff2|woff|ttf)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
        location ~* \.(png|jpg|jpeg|gif|svg|webp|avif|ico)$ {
            expires 30d;
            add_header Cache-Control "public";
        }
        location ~* \.html$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }

    location /api/ {
        proxy_pass         http://kongger_api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "keep-alive";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        limit_req zone=api burst=20 nodelay;
    }

    location /health { proxy_pass http://kongger_api; }

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/javascript application/font-woff2;
}

# In nginx.conf http{} block add:
# limit_req_zone $binary_remote_addr zone=api:10m rate=2r/s;
