<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart AI</title>
  <link rel="stylesheet" href="smart-ai.css">
</head>
<body>
  <!-- Title Bar -- Frameless Drag Region -->
  <div id="titlebar" class="titlebar">
    <div class="titlebar-drag">
      <span class="titlebar-icon">◈</span>
      <span class="titlebar-text">SMART AI</span>
    </div>
    <div class="titlebar-controls">
      <button class="titlebar-btn" id="btnMinimize" title="Minimize">─</button>
      <button class="titlebar-btn titlebar-close" id="btnClose" title="Close">✕</button>
    </div>
  </div>

  <!-- Tab Bar -->
  <div id="tabbar" class="tabbar">
    <button class="tab active" data-tab="dashboard">Dashboard</button>
    <button class="tab" data-tab="diagram">Diagram</button>
    <button class="tab" data-tab="notes">Notes</button>
    <button class="tab" data-tab="tasks">Tasks</button>
  </div>

  <!-- Tab Content -->
  <div id="content" class="content">

    <!-- DASHBOARD TAB -->
    <div id="tab-dashboard" class="tab-content active">
      <!-- Clock -->
      <div class="panel clock-panel">
        <div id="clock-time" class="clock-time">--:--:--</div>
        <div id="clock-date" class="clock-date">---</div>
      </div>

      <!-- Weather -->
      <div class="panel weather-panel" id="weather-panel">
        <div class="panel-header">🌤 WEATHER</div>
        <div id="weather-content" class="weather-content">
          <div class="weather-loading">Fetching weather...</div>
        </div>
      </div>

      <!-- System Status -->
      <div class="panel sys-panel">
        <div class="panel-header">⚙ SYSTEM</div>
        <div class="sys-grid">
          <div class="sys-item">
            <span class="sys-label">CPU</span>
            <div class="sys-bar-bg"><div class="sys-bar cpu-bar" id="cpu-bar"></div></div>
            <span class="sys-value" id="cpu-value">0%</span>
          </div>
          <div class="sys-item">
            <span class="sys-label">RAM</span>
            <div class="sys-bar-bg"><div class="sys-bar ram-bar" id="ram-bar"></div></div>
            <span class="sys-value" id="ram-value">0%</span>
          </div>
          <div class="sys-item">
            <span class="sys-label">DISK</span>
            <div class="sys-bar-bg"><div class="sys-bar disk-bar" id="disk-bar"></div></div>
            <span class="sys-value" id="disk-value">0%</span>
          </div>
          <div class="sys-item sys-uptime">
            <span class="sys-label">UPTIME</span>
            <span class="sys-value" id="uptime-value">0h 0m</span>
          </div>
        </div>
      </div>

      <!-- Agent Status -->
      <div class="panel agent-panel">
        <div class="panel-header">🤖 AGENTS</div>
        <div id="agent-list" class="agent-list">
          <div class="agent-loading">Checking...</div>
        </div>
      </div>

      <!-- Schedule / Agenda -->
      <div class="panel agenda-panel">
        <div class="panel-header">📅 TODAY'S SCHEDULE</div>
        <div id="agenda-list" class="agenda-list">
          <div class="agenda-empty">No events today</div>
        </div>
        <div class="agenda-add">
          <input type="text" id="agenda-input" placeholder="Add quick event..." />
          <button id="agenda-btn" class="btn-small">+</button>
        </div>
      </div>

      <!-- Quick Recording -->
      <div class="panel rec-panel">
        <div class="panel-header">🎤 QUICK RECORDING</div>
        <div class="rec-controls">
          <button id="rec-btn" class="rec-btn">⏺</button>
          <span id="rec-timer" class="rec-timer">00:00</span>
          <span id="rec-status" class="rec-status">Not recording</span>
        </div>
      </div>
    </div>

    <!-- DIAGRAM TAB -->
    <div id="tab-diagram" class="tab-content">
      <div class="panel diagram-panel" style="flex:1;padding:0;overflow:hidden;">
        <div id="three-container" style="width:100%;height:100%;"></div>
      </div>
    </div>

    <!-- NOTES TAB -->
    <div id="tab-notes" class="tab-content">
      <div class="panel notes-panel">
        <div class="panel-header">📝 QUICK NOTES</div>
        <textarea id="note-textarea" class="note-textarea" placeholder="Type a note here..."></textarea>
        <button id="note-save-btn" class="btn">Save Note</button>
        <div class="notes-list-header">Saved Notes</div>
        <div id="notes-list" class="notes-list">
          <div class="notes-empty">No notes yet</div>
        </div>
      </div>
    </div>

    <!-- TASKS TAB -->
    <div id="tab-tasks" class="tab-content">
      <div class="panel tasks-panel">
        <div class="panel-header">📋 TODAY'S TASKS (Notion)</div>
        <div id="tasks-list" class="tasks-list">
          <div class="tasks-loading">Loading tasks...</div>
        </div>
      </div>
    </div>

  </div>

  <!-- Scanline overlay -->
  <div id="scanlines" class="scanlines"></div>

  <!-- Scripts -->
  <script src="../assets/three.min.js"></script>
  <script src="../assets/OrbitControls.js"></script>
  <script src="smart-ai.js"></script>
</body>
</html>
