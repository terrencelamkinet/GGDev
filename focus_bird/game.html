<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>專注飛鳥 🦅</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    color: #fff;
    touch-action: manipulation;
  }
  .game-wrapper {
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(0,0,0,0.5);
  }
  canvas {
    display: block;
    background: #87CEEB;
    cursor: pointer;
  }
  .hud {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 10px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    pointer-events: none;
    font-size: 15px;
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
  }
  .focus-bar-outer {
    width: 120px;
    height: 14px;
    background: rgba(255,255,255,0.2);
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.2);
  }
  .focus-bar-inner {
    height: 100%;
    width: 50%;
    background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb);
    border-radius: 10px;
    transition: width 0.15s;
  }
  #overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.65);
    text-align: center;
    gap: 10px;
    padding: 20px;
  }
  #overlay h1 { font-size: 36px; }
  #overlay p { font-size: 16px; opacity: 0.8; max-width: 300px; }
  #overlay button {
    margin-top: 6px;
    padding: 12px 40px;
    font-size: 18px;
    border: none;
    border-radius: 12px;
    background: #48dbfb;
    color: #1a1a2e;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.15s;
  }
  #overlay button:hover { transform: scale(1.05); }
  .hidden { display: none !important; }
  .credits {
    position: absolute;
    bottom: 8px;
    right: 14px;
    font-size: 10px;
    opacity: 0.4;
    pointer-events: none;
  }
  .space-hint {
    position: absolute;
    bottom: 50px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.65);
    padding: 8px 18px;
    border-radius: 14px;
    font-size: 13px;
    pointer-events: none;
    text-align: center;
    line-height: 1.5;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .game-hint {
    position: absolute;
    top: 45%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.6);
    color: #fff;
    padding: 10px 22px;
    border-radius: 12px;
    font-size: 15px;
    pointer-events: none;
    z-index: 10;
    animation: hintFade 3s ease-in-out forwards;
  }
  @keyframes hintFade {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
    10% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    70% { opacity: 1; }
    100% { opacity: 0; }
  }
</style>
</head>
<body>

<div class="game-wrapper">
  <canvas id="gameCanvas" width="400" height="500"></canvas>

  <div class="hud">
    <div>
      <span id="scoreDisplay">💰 0</span>
      <span style="margin-left:14px;" id="levelDisplay">⭐ Lv.1</span>
      <span style="margin-left:12px;font-size:14px;" id="targetDisplay">0/30</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <span style="font-size:12px;">專注</span>
      <div class="focus-bar-outer">
        <div class="focus-bar-inner" id="focusBar" style="width:50%;"></div>
      </div>
    </div>
  </div>

  <div id="overlay">
    <h1>🦅 專注飛鳥</h1>
    <p>拍 Space 下沉食金幣<br>預設向上浮</p>
    <p style="font-size:13px;opacity:0.6;">⎵ Space 下沉 &nbsp;|&nbsp; 預設上升</p>
    <button id="startBtn">開始遊戲</button>
  </div>

  <div id="spaceHint" class="space-hint">⎵ 拍Space下沉 · 預設上升</div>
  <div id="gameHint" class="game-hint hidden">⎵ 拍 Space 下沉 · 預設上升</div>
  <div class="credits">專注飛鳥 · v1.1</div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = 400, H = 500;

// ===== 遊戲狀態 =====
const state = {
  running: false,
  gameOver: false,
  score: 0,
  level: 1,
  focusLevel: 50,
  targetFocus: 50,
  spacePressed: false,
  externalMode: false,
  ws: null,
  attention: 0,
  bird: { x: 200, y: 250, vy: 0 },
  coins: [],
  spawnTimer: 0,
  nextSpawn: 0,
  frame: 0,
  comboCount: 0,
  totalCoins: 0,
  coinsSpawned: 0,

// ===== 音效 =====
function playTone(freq, dur = 0.08) {
  try {
    const ac = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain);
    gain.connect(ac.destination);
    osc.frequency.value = freq;
    gain.gain.value = 0.12;
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
    osc.start();
    osc.stop(ac.currentTime + dur);
  } catch(e) {}
}
function coinSound() { playTone(880, 0.1); }
function levelUpSound() { playTone(660, 0.1); setTimeout(()=>playTone(880,0.15),100); }
function gameOverSound() { playTone(330, 0.2); setTimeout(()=>playTone(220,0.3),200); }

// ===== 鳥嘅物理 (Space控制：按住下沉，放開上浮) =====
function updateBird() {
  const b = state.bird;
  const cfg = getLevelConfig(state.level);
  if (state.spacePressed) {
    b.vy += 0.03 * cfg.gravityFactor;
  } else {
    b.vy -= 0.02 * cfg.gravityFactor;
  }
  b.vy *= 0.95;
  b.y += b.vy;
  if (b.y > H - 50) b.y = H - 50;
}

// ===== 關卡設定 =====
function getLevelConfig(level) {
  const maxLevel = 20;
  const l = Math.min(level, maxLevel);
  const coinTarget = 10 + (l - 1) * 5;
  const gravityFactor = 1 + l * 0.06;
  const coinInterval = 180 + Math.floor(Math.random() * 120);
  return { coinTarget, gravityFactor, coinInterval, maxLevel };
}

// ===== 金幣 =====
function spawnCoin() {
  const cfg = getLevelConfig(state.level);
  const maxCoins = cfg.coinTarget + 5;
  if (state.coinsSpawned >= maxCoins) return;
  state.coins.push({ x: W + 20, y: H - 40, size: 14, collected: false, value: 10 });
  state.coinsSpawned++;
}

function updateCoins() {
  for (let i = state.coins.length - 1; i >= 0; i--) {
    const c = state.coins[i];
    if (c.collected) { state.coins.splice(i, 1); continue; }
    c.x -= 1.2 + state.level * 0.08;
    if (c.x < -40) { state.coins.splice(i, 1); continue; }
    const b = state.bird;
    const dx = c.x - b.x;
    const dy = c.y - b.y;
    if (Math.sqrt(dx*dx + dy*dy) < c.size + 18) {
      c.collected = true;
      state.score += c.value;
      state.totalCoins++;
      state.comboCount++;
      coinSound();
      if (state.comboCount % 5 === 0) {
        state.score += 20;
        playTone(1100, 0.12);
      }
      const cfg = getLevelConfig(state.level);
      if (state.totalCoins >= cfg.coinTarget) {
        showLevelComplete();
        return;
      }
    }
  }
}

// ===== 過關畫面 =====
function showLevelComplete() {
  state.running = false;
  levelUpSound();
  const cfg = getLevelConfig(state.level);
  const elapsed = Math.floor((Date.now() - state.levelStartTime) / 1000);
  const timeStr = elapsed >= 60 ? `${Math.floor(elapsed/60)}m ${elapsed%60}s` : `${elapsed}s`;
  const key = 'leaderboard_lv' + state.level;
  let records = [];
  try { records = JSON.parse(localStorage.getItem(key) || '[]'); if(!Array.isArray(records)) records = []; } catch(e){}
  records.push({ time: elapsed, date: new Date().toISOString().slice(0,10), coins: cfg.coinTarget });
  records.sort(function(a,b){ return a.time - b.time; });
  if (records.length > 10) records = records.slice(0,10);
  localStorage.setItem(key, JSON.stringify(records));

  const overlay = document.getElementById('overlay');
  overlay.classList.remove('hidden');
  var lbHtml = '<div style="margin:10px 0 5px;font-size:13px;opacity:0.7;">📊 排行榜 TOP5</div>';
  for (var i = 0; i < Math.min(5, records.length); i++) {
    var medal = ['🥇','🥈','🥉'][i] || (i+1) + '.';
    var t = records[i].time;
    var ts = t >= 60 ? Math.floor(t/60) + 'm ' + (t%60) + 's' : t + 's';
    lbHtml += '<div style="font-size:13px;">' + medal + ' ' + ts + (i === 0 ? ' 👑' : '') + '</div>';
  }

  var canNext = state.level < cfg.maxLevel;
  overlay.innerHTML = 
    '<h1>🎉 第' + state.level + '關完成！</h1>' +
    '<p style="font-size:20px;">⏱ <strong>' + timeStr + '</strong></p>' +
    '<p style="font-size:13px;opacity:0.6;">金幣：' + cfg.coinTarget + ' 個</p>' +
    lbHtml +
    '<button id="nextLevelBtn" style="margin-top:4px;">' + (canNext ? '➡️ 下一關' : '🏆 全部完成！') + '</button>' +
    '<button id="restartLv1Btn" style="margin-top:8px;padding:8px 20px;font-size:14px;background:rgba(255,255,255,0.1);color:#fff;">🔄 重新開始</button>';

  document.getElementById('nextLevelBtn').onclick = canNext ? function(){ startLevel(state.level + 1); } : resetGame;
  document.getElementById('restartLv1Btn').onclick = resetGame;
}

// ===== Game Over =====
function showGameOver() {
  state.gameOver = true;
  state.running = false;
  gameOverSound();
  var overlay = document.getElementById('overlay');
  overlay.classList.remove('hidden');
  var _cfg = getLevelConfig(state.level);
  overlay.innerHTML = 
    '<h1>💫 遊戲結束</h1>' +
    '<p>分數：💰 ' + state.score + ' | Lv.' + state.level + '</p>' +
    '<p style="font-size:13px;opacity:0.6;">關卡進度：' + state.totalCoins + '/' + _cfg.coinTarget + '</p>' +
    '<button id="restartBtn">再玩一次</button>';
  document.getElementById('restartBtn').onclick = resetGame;
}

// ===== 重置 =====
function resetGame() {
  state.running = false;
  state.gameOver = false;
  state.score = 0;
  state.level = 1;
  state.focusLevel = 50;
  state.spacePressed = false;
  state.bird = { x: 200, y: 250, vy: 0 };
  state.coins = [];
  state.comboCount = 0;
  state.totalCoins = 0;
  state.frame = 0;
  var overlay = document.getElementById('overlay');
  overlay.classList.remove('hidden');
  overlay.innerHTML = 
    '<h1>🦅 專注飛鳥</h1>' +
    '<p>拍 Space 下沉食金幣<br>預設向上浮</p>' +
    '<p style="font-size:13px;opacity:0.6;">⎵ Space 下沉 | 預設上升</p>' +
    '<button id="startBtn">開始遊戲</button>';
  document.getElementById('startBtn').onclick = function(){ startLevel(1); };
  ctx.clearRect(0, 0, W, H);
  drawBackground();
  drawBird();
}

// ===== 主遊戲 loop =====
function gameLoop() {
  if (!state.running) return;
  state.frame++;

  if (state.spacePressed) {
    state.focusLevel = Math.min(100, state.focusLevel + 1.5);
  } else {
    state.focusLevel = Math.max(0, state.focusLevel - 0.5);
  }
  updateBird();

  if (!state.nextSpawn) state.nextSpawn = 480 + Math.floor(Math.random() * 120);
  state.spawnTimer++;
  var cfg = getLevelConfig(state.level);
  var maxCoins = cfg.coinTarget + 5;
  if (state.coinsSpawned < maxCoins && state.spawnTimer >= state.nextSpawn) {
    state.spawnTimer = 0;
    state.nextSpawn = 180 + Math.floor(Math.random() * 120);
    spawnCoin();
  }
  updateCoins();

  ctx.clearRect(0, 0, W, H);
  drawBackground();
  drawCoins();
  drawBird();
  drawHUD();

  if (state.bird.y <= 30) {
    showGameOver();
    return;
  }
  requestAnimationFrame(gameLoop);
}

// ===== 開始（或下一關）=====
function startLevel(levelNum) {
  document.getElementById('overlay').classList.add('hidden');
  state.running = true;
  state.gameOver = false;
  state.level = levelNum;
  state.totalCoins = 0;
  state.coinsSpawned = 0;
  state.focusLevel = 50;
  state.bird = { x: 200, y: 250, vy: 0 };
  state.coins = [];
  state.spawnTimer = 0;
  state.nextSpawn = 0;
  state.levelStartTime = Date.now();
  state.spacePressed = false;
  gameLoop();
  // 3秒後隱藏提示
  var h1 = document.getElementById('gameHint');
  if (h1) { h1.classList.remove('hidden'); h1.style.animation = 'none'; h1.style.opacity = '1';
    setTimeout(function(){ h1.classList.add('hidden'); }, 3000); }
  var h2 = document.getElementById('spaceHint');
  if (h2) { h2.classList.remove('hidden'); h2.style.animation = 'none'; h2.style.opacity = '1';
    setTimeout(function(){ h2.classList.add('hidden'); }, 3000); }
}

// ===== WebSocket (腦波 external mode) =====
function connectBrainLink(wsUrl) {
  state.externalMode = true;
  state.ws = new WebSocket(wsUrl);
  state.ws.onopen = function(){ console.log('🧠 BrainLink connected'); };
  state.ws.onmessage = function(event) {
    try {
      var data = JSON.parse(event.data);
      state.attention = data.attention;
      state.spacePressed = data.shouldDive;
    } catch(e) {}
  };
  state.ws.onclose = function(){
    console.log('🧠 BrainLink disconnected, retrying in 3s...');
    state.externalMode = false;
    setTimeout(function(){ connectBrainLink(wsUrl); }, 3000);
  };
  state.ws.onerror = function(){ state.ws.close(); };
}

// If URL has ?ws=...
(function() {
  var params = new URLSearchParams(window.location.search);
  var wsUrl = params.get('ws');
  if (wsUrl) connectBrainLink(wsUrl);
})();

// ===== 鍵盤控制 =====
document.addEventListener('keydown', function(e) {
  if (e.key === ' ') {
    e.preventDefault();
    if (!state.running && state.gameOver) resetGame();
    if (!state.externalMode) state.spacePressed = true;
  }
});
document.addEventListener('keyup', function(e) {
  if (e.key === ' ') { e.preventDefault(); if (!state.externalMode) state.spacePressed = false; }
});

// Touch
document.getElementById('gameCanvas').addEventListener('touchstart', function(e) {
  e.preventDefault();
  if (!state.running && state.gameOver) resetGame();
  else state.spacePressed = true;
});
document.getElementById('gameCanvas').addEventListener('touchend', function(e) {
  e.preventDefault(); state.spacePressed = false;
});
document.getElementById('gameCanvas').addEventListener('touchcancel', function(e) {
  state.spacePressed = false;
});

// Mouse
document.getElementById('gameCanvas').addEventListener('mousedown', function(e) {
  if (!state.running && state.gameOver) resetGame();
  else state.spacePressed = true;
});
document.getElementById('gameCanvas').addEventListener('mouseup', function() { state.spacePressed = false; });
document.getElementById('gameCanvas').addEventListener('mouseleave', function() { if (!state.externalMode) state.spacePressed = false; });

// ===== Start button =====
document.getElementById('startBtn').onclick = function(){ startLevel(1); };

// ===== 初始化畫面 =====
drawBackground();
drawBird();
</script>
</body>
</html>
