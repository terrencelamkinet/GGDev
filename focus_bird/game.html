<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>專注飛鳥 🦅</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    color: #fff;
    touch-action: manipulation;
  }
  .game-wrapper {
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(0,0,0,0.5);
  }
  canvas {
    display: block;
    background: #87CEEB;
    cursor: pointer;
  }
  .hud {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 10px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    pointer-events: none;
    font-size: 15px;
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
  }
  .focus-bar-outer {
    width: 120px;
    height: 14px;
    background: rgba(255,255,255,0.2);
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.2);
  }
  .focus-bar-inner {
    height: 100%;
    width: 50%;
    background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb);
    border-radius: 10px;
    transition: width 0.15s;
  }
  #overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.65);
    text-align: center;
    gap: 10px;
    padding: 20px;
  }
  #overlay h1 { font-size: 36px; }
  #overlay p { font-size: 16px; opacity: 0.8; max-width: 300px; }
  #overlay button {
    margin-top: 6px;
    padding: 12px 40px;
    font-size: 18px;
    border: none;
    border-radius: 12px;
    background: #48dbfb;
    color: #1a1a2e;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.15s;
  }
  #overlay button:hover { transform: scale(1.05); }
  .hidden { display: none !important; }
  .credits {
    position: absolute;
    bottom: 8px;
    right: 14px;
    font-size: 10px;
    opacity: 0.4;
    pointer-events: none;
  }
  .space-hint {
    position: absolute;
    bottom: 50px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.65);
    padding: 8px 18px;
    border-radius: 14px;
    font-size: 13px;
    pointer-events: none;
    text-align: center;
    line-height: 1.5;
    border: 1px solid rgba(255,255,255,0.08);
  }
</style>
</head>
<body>

<div class="game-wrapper">
  <canvas id="gameCanvas" width="400" height="500"></canvas>

  <div class="hud">
    <div>
      <span id="scoreDisplay">💰 0</span>
      <span style="margin-left:14px;" id="levelDisplay">⭐ Lv.1</span>
      <span style="margin-left:12px;font-size:14px;" id="targetDisplay">0/30</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <span style="font-size:12px;">專注</span>
      <div class="focus-bar-outer">
        <div class="focus-bar-inner" id="focusBar" style="width:50%;"></div>
      </div>
    </div>
  </div>

  <div id="overlay">
    <h1>🦅 專注飛鳥</h1>
    <p>拍 Space 下沉食金幣<br>預設向上浮</p>
    <p style="font-size:13px;opacity:0.6;">⎵ Space 下沉 &nbsp;|&nbsp; 預設上升</p>
    <button id="startBtn">開始遊戲</button>
  </div>

  <div class="space-hint">⎵ 拍Space下沉 · 預設上升</div>
  <div class="credits">專注飛鳥 · v2</div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = 400, H = 500;

// ===== 遊戲狀態 =====
const state = {
  running: false,
  gameOver: false,
  score: 0,
  level: 1,
  focusLevel: 50,
  targetFocus: 50,
  spacePressed: false,
  externalMode: false,  // true = 用腦波/WebSocket
  ws: null,             // WebSocket connection
  attention: 0,         // 腦波 attention 值
  bird: { x: 100, y: 100, vy: 0 },
  coins: [],
  spawnTimer: 0,
  frame: 0,
  comboCount: 0,
  totalCoins: 0,
};

// ===== 關卡設定 =====
function getLevelConfig(level) {
  const coinTarget = 30 + (level - 1) * 15;
  const gravityFactor = 1 + level * 0.06;
  // 每個金幣之間 delay 3-5秒 (180-300 frames at 60fps)
  const coinInterval = 180 + Math.floor(Math.random() * 120);
  return { coinTarget, gravityFactor, coinInterval };
}

// ===== 音效 =====
function playTone(freq, dur = 0.08) {
  try {
    const ac = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain);
    gain.connect(ac.destination);
    osc.frequency.value = freq;
    gain.gain.value = 0.12;
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
    osc.start();
    osc.stop(ac.currentTime + dur);
  } catch(e) {}
}
function coinSound() { playTone(880, 0.1); }
function levelUpSound() { playTone(660, 0.1); setTimeout(()=>playTone(880,0.15),100); }
function gameOverSound() { playTone(330, 0.2); setTimeout(()=>playTone(220,0.3),200); }

// ===== 鳥嘅物理 (Space控制：按住下沉，放開上浮) =====
function updateBird() {
  const b = state.bird;
  const cfg = getLevelConfig(state.level);

  if (state.spacePressed) {
    // 拍Space → 向下沉
    b.vy += 0.015 * cfg.gravityFactor;
  } else {
    // 預設向上浮 (default上升)
    b.vy -= 0.02 * cfg.gravityFactor;
  }

  // 阻力
  b.vy *= 0.95;

  // 邊界
  b.y += b.vy;
  if (b.y < 30) b.y = 30;
  if (b.y > H - 50) b.y = H - 50;
}

// ===== 金幣 =====
function spawnCoin() {
  const cfg = getLevelConfig(state.level);
  // 金幣總數 = 30，食完唔再出
  if (state.coins.length >= 30) return;

  const x = W + 20;
  const y = H - 40;  // 地上
  const size = 14;
  state.coins.push({ x, y, size, collected: false, value: 10 });
}

function updateCoins() {
  for (let i = state.coins.length - 1; i >= 0; i--) {
    const c = state.coins[i];
    if (c.collected) { state.coins.splice(i, 1); continue; }
    c.x -= 1.2 + state.level * 0.08;
    if (c.x < -40) { state.coins.splice(i, 1); continue; }

    // 碰撞檢測
    const b = state.bird;
    const dx = c.x - b.x;
    const dy = c.y - b.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < c.size + 18) {
      c.collected = true;
      state.score += c.value;
      state.totalCoins++;
      state.comboCount++;
      coinSound();

      if (state.comboCount % 5 === 0) {
        state.score += 20;
        playTone(1100, 0.12);
      }

      checkLevelUp();
    }
  }
}

function checkLevelUp() {
  const cfg = getLevelConfig(state.level);
  if (state.totalCoins >= cfg.coinTarget && state.level < 20) {
    state.level++;
    state.totalCoins = 0;
    levelUpSound();
  }
}

// ===== 繪畫 =====
function drawBackground() {
  // ===== 天空 =====
  const skyGrad = ctx.createLinearGradient(0, 0, 0, H * 0.75);
  skyGrad.addColorStop(0, '#4a90d9');
  skyGrad.addColorStop(0.4, '#87CEEB');
  skyGrad.addColorStop(0.7, '#B8E6FF');
  skyGrad.addColorStop(1, '#E8F5E9');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, H);

  // ===== 太陽 =====
  ctx.beginPath();
  ctx.arc(W - 50, 45, 28, 0, Math.PI * 2);
  ctx.fillStyle = '#FFF3B0';
  ctx.fill();
  // 太陽光暈
  ctx.beginPath();
  ctx.arc(W - 50, 45, 35, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255, 243, 176, 0.15)';
  ctx.fill();

  // ===== 白雲 =====
  function drawCloud(cx, cy, scale) {
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.beginPath(); ctx.arc(cx, cy, 12*scale, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+14*scale, cy-4*scale, 10*scale, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+28*scale, cy, 9*scale, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+14*scale, cy+4*scale, 8*scale, 0, Math.PI*2); ctx.fill();
  }
  drawCloud(50, 50, 1);
  drawCloud(160, 70, 0.8);
  drawCloud(290, 40, 1.1);

  // ===== 遠山（移動）=====
  const m1x = - (state.frame * 0.15) % (W);  // scroll offset
  ctx.fillStyle = '#7CB342';
  ctx.beginPath();
  ctx.moveTo(m1x - W, H * 0.75);
  ctx.lineTo(m1x - W + 30, H * 0.55);
  ctx.lineTo(m1x - W + 60, H * 0.58);
  ctx.lineTo(m1x - W + 100, H * 0.48);
  ctx.lineTo(m1x - W + 140, H * 0.60);
  ctx.lineTo(m1x - W + 180, H * 0.52);
  ctx.lineTo(m1x - W + 220, H * 0.62);
  ctx.lineTo(m1x - W + 260, H * 0.50);
  ctx.lineTo(m1x - W + 300, H * 0.56);
  ctx.lineTo(m1x - W + 340, H * 0.46);
  ctx.lineTo(m1x - W + 380, H * 0.54);
  ctx.lineTo(m1x - W + 400, H * 0.62);
  ctx.lineTo(m1x, H * 0.65);
  ctx.lineTo(m1x, H * 0.75);
  ctx.closePath();
  ctx.fill();

  // second copy of far mountain to tile
  ctx.beginPath();
  ctx.moveTo(m1x, H * 0.75);
  ctx.lineTo(m1x + 30, H * 0.55);
  ctx.lineTo(m1x + 60, H * 0.58);
  ctx.lineTo(m1x + 100, H * 0.48);
  ctx.lineTo(m1x + 140, H * 0.60);
  ctx.lineTo(m1x + 180, H * 0.52);
  ctx.lineTo(m1x + 220, H * 0.62);
  ctx.lineTo(m1x + 260, H * 0.50);
  ctx.lineTo(m1x + 300, H * 0.56);
  ctx.lineTo(m1x + 340, H * 0.46);
  ctx.lineTo(m1x + 380, H * 0.54);
  ctx.lineTo(m1x + 400, H * 0.62);
  ctx.lineTo(m1x + 400, H * 0.75);
  ctx.closePath();
  ctx.fill();

  // 遠山陰影層
  const m2x = - (state.frame * 0.2) % (W);
  ctx.fillStyle = 'rgba(255,255,255,0.06)';
  ctx.beginPath();
  ctx.moveTo(m2x - W, H * 0.75);
  ctx.lineTo(m2x - W + 30, H * 0.58);
  ctx.lineTo(m2x - W + 60, H * 0.62);
  ctx.lineTo(m2x - W + 100, H * 0.52);
  ctx.lineTo(m2x - W + 140, H * 0.64);
  ctx.lineTo(m2x - W + 180, H * 0.56);
  ctx.lineTo(m2x - W + 220, H * 0.65);
  ctx.lineTo(m2x - W + 260, H * 0.54);
  ctx.lineTo(m2x - W + 300, H * 0.60);
  ctx.lineTo(m2x - W + 340, H * 0.50);
  ctx.lineTo(m2x - W + 380, H * 0.58);
  ctx.lineTo(m2x - W + 400, H * 0.65);
  ctx.lineTo(m2x, H * 0.68);
  ctx.lineTo(m2x, H * 0.75);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(m2x, H * 0.75);
  ctx.lineTo(m2x + 30, H * 0.58);
  ctx.lineTo(m2x + 60, H * 0.62);
  ctx.lineTo(m2x + 100, H * 0.52);
  ctx.lineTo(m2x + 140, H * 0.64);
  ctx.lineTo(m2x + 180, H * 0.56);
  ctx.lineTo(m2x + 220, H * 0.65);
  ctx.lineTo(m2x + 260, H * 0.54);
  ctx.lineTo(m2x + 300, H * 0.60);
  ctx.lineTo(m2x + 340, H * 0.50);
  ctx.lineTo(m2x + 380, H * 0.58);
  ctx.lineTo(m2x + 400, H * 0.65);
  ctx.lineTo(m2x + 400, H * 0.75);
  ctx.closePath();
  ctx.fill();

  // ===== 近山（移動更快）=====
  const m3x = - (state.frame * 0.3) % (W);
  ctx.fillStyle = '#558B2F';
  ctx.beginPath();
  ctx.moveTo(m3x - W, H * 0.78);
  ctx.lineTo(m3x - W + 50, H * 0.65);
  ctx.lineTo(m3x - W + 90, H * 0.72);
  ctx.lineTo(m3x - W + 130, H * 0.60);
  ctx.lineTo(m3x - W + 170, H * 0.68);
  ctx.lineTo(m3x - W + 210, H * 0.70);
  ctx.lineTo(m3x - W + 250, H * 0.64);
  ctx.lineTo(m3x - W + 290, H * 0.72);
  ctx.lineTo(m3x - W + 330, H * 0.62);
  ctx.lineTo(m3x - W + 370, H * 0.70);
  ctx.lineTo(m3x - W + 400, H * 0.74);
  ctx.lineTo(m3x, H * 0.72);
  ctx.lineTo(m3x, H * 0.78);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(m3x, H * 0.78);
  ctx.lineTo(m3x + 50, H * 0.65);
  ctx.lineTo(m3x + 90, H * 0.72);
  ctx.lineTo(m3x + 130, H * 0.60);
  ctx.lineTo(m3x + 170, H * 0.68);
  ctx.lineTo(m3x + 210, H * 0.70);
  ctx.lineTo(m3x + 250, H * 0.64);
  ctx.lineTo(m3x + 290, H * 0.72);
  ctx.lineTo(m3x + 330, H * 0.62);
  ctx.lineTo(m3x + 370, H * 0.70);
  ctx.lineTo(m3x + 400, H * 0.74);
  ctx.lineTo(m3x + 400, H * 0.78);
  ctx.closePath();
  ctx.fill();

  // ===== 河流 =====
  ctx.fillStyle = 'rgba(66, 165, 245, 0.3)';
  ctx.beginPath();
  ctx.moveTo(0, H - 25);
  ctx.quadraticCurveTo(W*0.25, H-35, W*0.5, H-25);
  ctx.quadraticCurveTo(W*0.75, H-15, W, H-25);
  ctx.lineTo(W, H-10);
  ctx.quadraticCurveTo(W*0.75, H, W*0.5, H-12);
  ctx.quadraticCurveTo(W*0.25, H-22, 0, H-10);
  ctx.closePath();
  ctx.fill();

  // 水面反光
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  for (let i = 0; i < 4; i++) {
    const rx = 30 + i * 90 + Math.sin(state.frame * 0.03 + i) * 5;
    ctx.fillRect(rx, H-22, 15, 3);
  }

  // ===== 草地（地面）=====
  ctx.fillStyle = '#4CAF50';
  ctx.fillRect(0, H-20, W, 20);

  // 草地紋理（草葉）
  ctx.strokeStyle = '#388E3C';
  ctx.lineWidth = 1;
  for (let i = 0; i < 30; i++) {
    const gx = (i * 13 + state.frame * 0.2) % W;
    const gh = 5 + Math.sin(i * 2.7) * 3;
    ctx.beginPath();
    ctx.moveTo(gx, H-20);
    ctx.lineTo(gx - 1, H-20 - gh);
    ctx.stroke();
  }

  // ===== 花朵 =====
  const flowerColors = ['#E91E63', '#FF5722', '#FFEB3B', '#9C27B0', '#FF9800'];
  for (let i = 0; i < 8; i++) {
    const fx = (i * 47 + 15) % W;
    const fy = H - 18;
    const fc = flowerColors[i % flowerColors.length];
    // 花莖
    ctx.strokeStyle = '#388E3C';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(fx, fy);
    ctx.lineTo(fx, fy - 6 - Math.sin(i * 1.3) * 3);
    ctx.stroke();
    // 花瓣
    ctx.fillStyle = fc;
    for (let p = 0; p < 5; p++) {
      const angle = (p / 5) * Math.PI * 2 + state.frame * 0.005;
      ctx.beginPath();
      ctx.ellipse(fx + Math.cos(angle) * 2.5, fy - 7 + Math.sin(angle) * 2.5, 2, 1.5, angle, 0, Math.PI * 2);
      ctx.fill();
    }
    // 花心
    ctx.fillStyle = '#FFC107';
    ctx.beginPath();
    ctx.arc(fx, fy - 7, 1.5, 0, Math.PI * 2);
    ctx.fill();
  }

  // ===== 動物：樹上雀仔 =====
  const birdPositions = [
    {x: 30, y: H*0.52, size: 1},
    {x: 180, y: H*0.48, size: 0.8},
    {x: 320, y: H*0.55, size: 0.9}
  ];
  for (const bp of birdPositions) {
    ctx.fillStyle = '#5D4037';
    const bobY = Math.sin(state.frame * 0.04 + bp.x) * 1.5;
    // 身體
    ctx.beginPath();
    ctx.ellipse(bp.x, bp.y + bobY, 4*bp.size, 3*bp.size, 0, 0, Math.PI*2);
    ctx.fill();
    // 頭
    ctx.beginPath();
    ctx.arc(bp.x + 4*bp.size, bp.y - 2*bp.size + bobY, 2.5*bp.size, 0, Math.PI*2);
    ctx.fill();
    // 嘴
    ctx.fillStyle = '#FF9800';
    ctx.beginPath();
    ctx.moveTo(bp.x + 6*bp.size, bp.y - 2*bp.size + bobY);
    ctx.lineTo(bp.x + 9*bp.size, bp.y - 2*bp.size + bobY);
    ctx.lineTo(bp.x + 7*bp.size, bp.y - 1*bp.size + bobY);
    ctx.closePath();
    ctx.fill();
    // 眼
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(bp.x + 5*bp.size, bp.y - 3*bp.size + bobY, 1.2*bp.size, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(bp.x + 5.5*bp.size, bp.y - 3*bp.size + bobY, 0.6*bp.size, 0, Math.PI*2);
    ctx.fill();
  }

  // ===== 蝴蝶 =====
  for (let i = 0; i < 3; i++) {
    const bx = (80 + i * 150 + Math.sin(state.frame * 0.02 + i*2) * 20) % W;
    const by = 120 + i * 40 + Math.sin(state.frame * 0.03 + i) * 10;
    const wingFlap = Math.sin(state.frame * 0.1 + i) * 3;
    ctx.fillStyle = '#CE93D8';
    // 左翼
    ctx.beginPath();
    ctx.ellipse(bx - 4, by, 5, 3 + wingFlap, -0.3, 0, Math.PI*2);
    ctx.fill();
    // 右翼
    ctx.beginPath();
    ctx.ellipse(bx + 4, by, 5, 3 + wingFlap, 0.3, 0, Math.PI*2);
    ctx.fill();
    // 身體
    ctx.fillStyle = '#4A148C';
    ctx.beginPath();
    ctx.ellipse(bx, by, 1.5, 3, 0, 0, Math.PI*2);
    ctx.fill();
  }

  // ===== 金幣落地提示 =====
  ctx.fillStyle = 'rgba(255, 215, 0, 0.12)';
  ctx.fillRect(0, H-25, W, 5);
}

function drawBird() {
  const b = state.bird;
  const focus = state.focusLevel;

  ctx.save();
  ctx.translate(b.x, b.y);

  const angle = Math.max(-0.3, Math.min(0.3, b.vy * 0.04));
  ctx.rotate(angle);

  // 身體
  ctx.fillStyle = '#e17055';
  ctx.beginPath();
  ctx.ellipse(0, 0, 20, 12, 0, 0, Math.PI * 2);
  ctx.fill();

  // 翅膀
  const wingY = Math.sin(state.frame * 0.12) * 4;
  ctx.fillStyle = '#d35400';
  ctx.beginPath();
  ctx.moveTo(-8, -2);
  ctx.lineTo(-18 + wingY, -10 + wingY);
  ctx.lineTo(4, -2);
  ctx.fill();

  // 眼
  ctx.fillStyle = '#2d3436';
  ctx.beginPath();
  ctx.arc(10, -3, 2.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(11, -4, 1, 0, Math.PI * 2);
  ctx.fill();

  // 嘴
  ctx.fillStyle = '#fdcb6e';
  ctx.beginPath();
  ctx.moveTo(18, 0);
  ctx.lineTo(26, -2);
  ctx.lineTo(26, 2);
  ctx.closePath();
  ctx.fill();

  // 專注光環
  if (focus > 70) {
    ctx.beginPath();
    ctx.arc(0, 0, 28, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(72, 219, 251, ${(focus - 70) / 100 * 0.2})`;
    ctx.fill();
  }
  if (focus < 25) {
    ctx.beginPath();
    ctx.arc(0, 0, 30, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 107, 107, ${(25 - focus) / 100 * 0.15})`;
    ctx.fill();
  }

  ctx.restore();
}

function drawCoins() {
  for (const c of state.coins) {
    if (c.collected) continue;
    ctx.save();
    ctx.translate(c.x, c.y);

    const rot = state.frame * 0.03 + c.x * 0.01;
    ctx.rotate(rot);

    ctx.beginPath();
    ctx.arc(0, 0, c.size, 0, Math.PI * 2);
    const grad = ctx.createRadialGradient(-2, -2, 0, 0, 0, c.size);
    grad.addColorStop(0, '#ffeaa7');
    grad.addColorStop(0.7, '#fdcb6e');
    grad.addColorStop(1, '#e17055');
    ctx.fillStyle = grad;
    ctx.fill();

    ctx.strokeStyle = '#d68910';
    ctx.lineWidth = 1.2;
    ctx.stroke();

    ctx.fillStyle = '#b8860b';
    ctx.font = `${Math.max(9, c.size - 2)}px Arial`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('$', 0, 0);

    ctx.restore();
  }
}

function drawHUD() {
  document.getElementById('scoreDisplay').textContent = `💰 ${state.score}`;
  document.getElementById('levelDisplay').textContent = `⭐ Lv.${state.level}`;
  const cfg = getLevelConfig(state.level);
  document.getElementById('targetDisplay').textContent = `${state.totalCoins}/${cfg.coinTarget}`;
  document.getElementById('focusBar').style.width = `${state.focusLevel}%`;
}

// ===== Game Over =====
function showGameOver() {
  state.gameOver = true;
  state.running = false;
  gameOverSound();
  const overlay = document.getElementById('overlay');
  overlay.classList.remove('hidden');
  const _cfg = getLevelConfig(state.level);
  overlay.innerHTML = `
    <h1>💫 遊戲結束</h1>
    <p>分數：💰 ${state.score} &nbsp;|&nbsp; Lv.${state.level}</p>
    <p style="font-size:13px;opacity:0.6;">關卡進度：${state.totalCoins}/${_cfg.coinTarget}</p>
    <button id="restartBtn">再玩一次</button>
  `;
  document.getElementById('restartBtn').onclick = resetGame;
}

// ===== 重置 =====
function resetGame() {
  state.running = false;
  state.gameOver = false;
  state.score = 0;
  state.level = 1;
  state.focusLevel = 50;
  state.targetFocus = 50;
  state.spacePressed = false;
  state.bird = { x: 100, y: 100, vy: 0 };
  state.coins = [];
  state.comboCount = 0;
  state.totalCoins = 0;
  state.frame = 0;

  const overlay = document.getElementById('overlay');
  overlay.classList.remove('hidden');
  overlay.innerHTML = `
    <h1>🦅 專注飛鳥</h1>
    <p>拍 Space 下沉食金幣<br>預設向上浮</p>
    <p style="font-size:13px;opacity:0.6;">⎵ Space 下沉 &nbsp;|&nbsp; 預設上升</p>
    <button id="startBtn">開始遊戲</button>
  `;
  document.getElementById('startBtn').onclick = startGame;

  ctx.clearRect(0, 0, W, H);
  drawBackground();
  drawBird();
}

// ===== 主遊戲 loop =====
function gameLoop() {
  if (!state.running) return;
  state.frame++;

  // Space按住=專注升，放開=專注降
  if (state.spacePressed) {
    state.focusLevel = Math.min(100, state.focusLevel + 1.5);
  } else {
    state.focusLevel = Math.max(0, state.focusLevel - 0.5);
  }

  // 鳥
  updateBird();

  // 金幣（random 3-5秒遇到一個）
  state.spawnTimer++;
  if (!state.nextSpawn) state.nextSpawn = 180 + Math.floor(Math.random() * 120);
  if (state.coins.length < 30 && state.spawnTimer >= state.nextSpawn) {
    state.spawnTimer = 0;
  state.nextSpawn = 0;
    state.nextSpawn = 180 + Math.floor(Math.random() * 120);
    spawnCoin();
  }
  updateCoins();

  // 繪畫
  ctx.clearRect(0, 0, W, H);
  drawBackground();
  drawCoins();
  drawBird();
  drawHUD();

  // 失敗條件：飛出頂 + 無專注
  if (state.bird.y <= 30 && state.focusLevel < 5) {
    showGameOver();
    return;
  }

  requestAnimationFrame(gameLoop);
}

// ===== 開始 =====
function startGame() {
  document.getElementById('overlay').classList.add('hidden');
  state.running = true;
  state.gameOver = false;
  state.bird = { x: 100, y: 100, vy: 0 };
  state.coins = [];
  state.spawnTimer = 0;
  state.nextSpawn = 0;
  state.score = 0;
  state.level = 1;
  state.totalCoins = 0;
  state.comboCount = 0;
  state.focusLevel = 50;
  state.targetFocus = 50;
  state.spacePressed = false;
  gameLoop();
}

// ===== WebSocket (腦波 external mode) =====
function connectBrainLink(wsUrl) {
  state.externalMode = true;
  state.ws = new WebSocket(wsUrl);
  state.ws.onopen = () => console.log('🧠 BrainLink connected');
  state.ws.onmessage = (event) => {
    try {
      const data = JSON.parse(event.data);
      state.attention = data.attention;
      // attention > threshold = 專注 = 下沉
      state.spacePressed = data.shouldDive;
    } catch(e) {}
  };
  state.ws.onclose = () => {
    console.log('🧠 BrainLink disconnected, retrying in 3s...');
    state.externalMode = false;
    setTimeout(() => connectBrainLink(wsUrl), 3000);
  };
  state.ws.onerror = () => state.ws.close();
}

// 如果 URL 有 ?ws=ws://... 就自動連接腦波
(function() {
  const params = new URLSearchParams(window.location.search);
  const wsUrl = params.get('ws');
  if (wsUrl) {
    connectBrainLink(wsUrl);
  }
})();

// ===== 鍵盤控制 (Space only) =====
document.addEventListener('keydown', (e) => {
  if (e.key === ' ') {
    e.preventDefault();
    if (!state.running) {
      if (state.gameOver) resetGame();
      else startGame();
      return;
    }
    if (!state.externalMode) state.spacePressed = true;
  }
});
document.addEventListener('keyup', (e) => {
  if (e.key === ' ') {
    e.preventDefault();
    if (!state.externalMode) state.spacePressed = false;
  }
});

// Touch support for mobile
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (!state.running) {
    if (state.gameOver) resetGame();
    else startGame();
  } else {
    state.spacePressed = true;
  }
});
canvas.addEventListener('touchend', (e) => {
  e.preventDefault();
  state.spacePressed = false;
});
canvas.addEventListener('touchcancel', (e) => {
  state.spacePressed = false;
});

// Mouse support
canvas.addEventListener('mousedown', (e) => {
  if (!state.running) {
    if (state.gameOver) resetGame();
    else startGame();
  } else {
    state.spacePressed = true;
  }
});
canvas.addEventListener('mouseup', () => { state.spacePressed = false; });
canvas.addEventListener('mouseleave', () => { if (!state.externalMode) state.spacePressed = false; });

// ===== Start button =====
document.getElementById('startBtn').onclick = startGame;

// ===== 初始化畫面 =====
drawBackground();
drawBird();
</script>
</body>
</html>
