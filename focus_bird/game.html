<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>專注飛鳥 🦅</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    color: #fff;
    touch-action: manipulation;
  }
  .game-wrapper {
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(0,0,0,0.5);
  }
  canvas {
    display: block;
    background: #87CEEB;
    cursor: pointer;
  }
  .hud {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 10px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    pointer-events: none;
    font-size: 15px;
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
  }
  .focus-bar-outer {
    width: 120px;
    height: 14px;
    background: rgba(255,255,255,0.2);
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.2);
  }
  .focus-bar-inner {
    height: 100%;
    width: 50%;
    background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb);
    border-radius: 10px;
    transition: width 0.15s;
  }
  #overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.65);
    text-align: center;
    gap: 10px;
    padding: 20px;
  }
  #overlay h1 { font-size: 36px; }
  #overlay p { font-size: 16px; opacity: 0.8; max-width: 300px; }
  #overlay button {
    margin-top: 6px;
    padding: 12px 40px;
    font-size: 18px;
    border: none;
    border-radius: 12px;
    background: #48dbfb;
    color: #1a1a2e;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.15s;
  }
  #overlay button:hover { transform: scale(1.05); }
  .hidden { display: none !important; }
  .credits {
    position: absolute;
    bottom: 8px;
    right: 14px;
    font-size: 10px;
    opacity: 0.4;
    pointer-events: none;
  }
  .space-hint {
    position: absolute;
    bottom: 50px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.65);
    padding: 8px 18px;
    border-radius: 14px;
    font-size: 13px;
    pointer-events: none;
    text-align: center;
    line-height: 1.5;
    border: 1px solid rgba(255,255,255,0.08);
  }
</style>
</head>
<body>

<div class="game-wrapper">
  <canvas id="gameCanvas" width="400" height="500"></canvas>

  <div class="hud">
    <div>
      <span id="scoreDisplay">💰 0</span>
      <span style="margin-left:14px;" id="levelDisplay">⭐ Lv.1</span>
      <span style="margin-left:12px;font-size:14px;" id="targetDisplay">0/30</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <span style="font-size:12px;">專注</span>
      <div class="focus-bar-outer">
        <div class="focus-bar-inner" id="focusBar" style="width:50%;"></div>
      </div>
    </div>
  </div>

  <div id="overlay">
    <h1>🦅 專注飛鳥</h1>
    <p>拍 Space 下沉食金幣<br>預設向上浮</p>
    <p style="font-size:13px;opacity:0.6;">⎵ Space 下沉 &nbsp;|&nbsp; 預設上升</p>
    <button id="startBtn">開始遊戲</button>
  </div>

  <div class="space-hint">⎵ 拍Space下沉 · 預設上升</div>
  <div class="credits">專注飛鳥 · v2</div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = 400, H = 500;

// ===== 遊戲狀態 =====
const state = {
  running: false,
  gameOver: false,
  score: 0,
  level: 1,
  focusLevel: 50,
  targetFocus: 50,
  spacePressed: false,
  bird: { x: 100, y: 100, vy: 0 },
  coins: [],
  spawnTimer: 0,
  frame: 0,
  comboCount: 0,
  totalCoins: 0,
};

// ===== 關卡設定 =====
function getLevelConfig(level) {
  const requiredFocus = Math.min(30 + level * 6, 88);
  const coinCount = Math.min(3 + level * 2, 10);
  const spawnRate = Math.max(50 - level * 2, 20);
  const gravityFactor = 1 + level * 0.06;
  const coinTarget = 30 + (level - 1) * 15;
  return { requiredFocus, coinCount, spawnRate, gravityFactor, coinTarget };
}

// ===== 音效 =====
function playTone(freq, dur = 0.08) {
  try {
    const ac = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain);
    gain.connect(ac.destination);
    osc.frequency.value = freq;
    gain.gain.value = 0.12;
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
    osc.start();
    osc.stop(ac.currentTime + dur);
  } catch(e) {}
}
function coinSound() { playTone(880, 0.1); }
function levelUpSound() { playTone(660, 0.1); setTimeout(()=>playTone(880,0.15),100); }
function gameOverSound() { playTone(330, 0.2); setTimeout(()=>playTone(220,0.3),200); }

// ===== 鳥嘅物理 (Space控制：按住下沉，放開上浮) =====
function updateBird() {
  const b = state.bird;
  const cfg = getLevelConfig(state.level);

  if (state.spacePressed) {
    // 拍Space → 向下沉
    b.vy += 0.015 * cfg.gravityFactor;
  } else {
    // 預設向上浮 (default上升)
    b.vy -= 0.02 * cfg.gravityFactor;
  }

  // 阻力
  b.vy *= 0.95;

  // 邊界
  b.y += b.vy;
  if (b.y < 30) b.y = 30;
  if (b.y > H - 50) b.y = H - 50;
}

// ===== 金幣 =====
function spawnCoin() {
  const cfg = getLevelConfig(state.level);
  if (state.coins.length >= cfg.coinCount) return;

  const x = W + 20;
  const y = Math.random() * (H - 180) + 60;
  const size = 11 + Math.random() * 5;
  state.coins.push({ x, y, size, collected: false, value: Math.floor(5 + state.level * 2 + Math.random() * 4) });
}

function updateCoins() {
  const cfg = getLevelConfig(state.level);
  for (let i = state.coins.length - 1; i >= 0; i--) {
    const c = state.coins[i];
    if (c.collected) { state.coins.splice(i, 1); continue; }
    c.x -= 1.2 + state.level * 0.08;
    if (c.x < -40) { state.coins.splice(i, 1); continue; }

    // 碰撞檢測
    const b = state.bird;
    const dx = c.x - b.x;
    const dy = c.y - b.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < c.size + 18) {
      c.collected = true;
      state.score += c.value;
      state.totalCoins++;
      state.comboCount++;
      coinSound();

      if (state.comboCount % 5 === 0) {
        state.score += 20;
        playTone(1100, 0.12);
      }

      checkLevelUp();
    }
  }
}

function checkLevelUp() {
  const cfg = getLevelConfig(state.level);
  if (state.totalCoins >= cfg.coinTarget && state.level < 20) {
    state.level++;
    state.totalCoins = 0;
    levelUpSound();
  }
}

// ===== 繪畫 =====
function drawBackground() {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#87CEEB');
  grad.addColorStop(0.6, '#B0E0FF');
  grad.addColorStop(1, '#90EE90');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // 地面
  ctx.fillStyle = '#5a8f3e';
  ctx.fillRect(0, H-25, W, 25);
  ctx.fillStyle = '#4a7f2e';
  ctx.fillRect(0, H-25, W, 3);
}

function drawBird() {
  const b = state.bird;
  const focus = state.focusLevel;

  ctx.save();
  ctx.translate(b.x, b.y);

  const angle = Math.max(-0.3, Math.min(0.3, b.vy * 0.04));
  ctx.rotate(angle);

  // 身體
  ctx.fillStyle = '#e17055';
  ctx.beginPath();
  ctx.ellipse(0, 0, 20, 12, 0, 0, Math.PI * 2);
  ctx.fill();

  // 翅膀
  const wingY = Math.sin(state.frame * 0.12) * 4;
  ctx.fillStyle = '#d35400';
  ctx.beginPath();
  ctx.moveTo(-8, -2);
  ctx.lineTo(-18 + wingY, -10 + wingY);
  ctx.lineTo(4, -2);
  ctx.fill();

  // 眼
  ctx.fillStyle = '#2d3436';
  ctx.beginPath();
  ctx.arc(10, -3, 2.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(11, -4, 1, 0, Math.PI * 2);
  ctx.fill();

  // 嘴
  ctx.fillStyle = '#fdcb6e';
  ctx.beginPath();
  ctx.moveTo(18, 0);
  ctx.lineTo(26, -2);
  ctx.lineTo(26, 2);
  ctx.closePath();
  ctx.fill();

  // 專注光環
  if (focus > 70) {
    ctx.beginPath();
    ctx.arc(0, 0, 28, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(72, 219, 251, ${(focus - 70) / 100 * 0.2})`;
    ctx.fill();
  }
  if (focus < 25) {
    ctx.beginPath();
    ctx.arc(0, 0, 30, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 107, 107, ${(25 - focus) / 100 * 0.15})`;
    ctx.fill();
  }

  ctx.restore();
}

function drawCoins() {
  for (const c of state.coins) {
    if (c.collected) continue;
    ctx.save();
    ctx.translate(c.x, c.y);

    const rot = state.frame * 0.03 + c.x * 0.01;
    ctx.rotate(rot);

    ctx.beginPath();
    ctx.arc(0, 0, c.size, 0, Math.PI * 2);
    const grad = ctx.createRadialGradient(-2, -2, 0, 0, 0, c.size);
    grad.addColorStop(0, '#ffeaa7');
    grad.addColorStop(0.7, '#fdcb6e');
    grad.addColorStop(1, '#e17055');
    ctx.fillStyle = grad;
    ctx.fill();

    ctx.strokeStyle = '#d68910';
    ctx.lineWidth = 1.2;
    ctx.stroke();

    ctx.fillStyle = '#b8860b';
    ctx.font = `${Math.max(9, c.size - 2)}px Arial`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('$', 0, 0);

    ctx.restore();
  }
}

function drawHUD() {
  document.getElementById('scoreDisplay').textContent = `💰 ${state.score}`;
  document.getElementById('levelDisplay').textContent = `⭐ Lv.${state.level}`;
  const cfg = getLevelConfig(state.level);
  document.getElementById('targetDisplay').textContent = `${state.totalCoins}/${cfg.coinTarget}`;
  document.getElementById('focusBar').style.width = `${state.focusLevel}%`;
}

// ===== Game Over =====
function showGameOver() {
  state.gameOver = true;
  state.running = false;
  gameOverSound();
  const overlay = document.getElementById('overlay');
  overlay.classList.remove('hidden');
  const _cfg = getLevelConfig(state.level);
  overlay.innerHTML = `
    <h1>💫 遊戲結束</h1>
    <p>分數：💰 ${state.score} &nbsp;|&nbsp; Lv.${state.level}</p>
    <p style="font-size:13px;opacity:0.6;">關卡進度：${state.totalCoins}/${_cfg.coinTarget}</p>
    <button id="restartBtn">再玩一次</button>
  `;
  document.getElementById('restartBtn').onclick = resetGame;
}

// ===== 重置 =====
function resetGame() {
  state.running = false;
  state.gameOver = false;
  state.score = 0;
  state.level = 1;
  state.focusLevel = 50;
  state.targetFocus = 50;
  state.spacePressed = false;
  state.bird = { x: 100, y: 100, vy: 0 };
  state.coins = [];
  state.comboCount = 0;
  state.totalCoins = 0;
  state.frame = 0;

  const overlay = document.getElementById('overlay');
  overlay.classList.remove('hidden');
  overlay.innerHTML = `
    <h1>🦅 專注飛鳥</h1>
    <p>拍 Space 下沉食金幣<br>預設向上浮</p>
    <p style="font-size:13px;opacity:0.6;">⎵ Space 下沉 &nbsp;|&nbsp; 預設上升</p>
    <button id="startBtn">開始遊戲</button>
  `;
  document.getElementById('startBtn').onclick = startGame;

  ctx.clearRect(0, 0, W, H);
  drawBackground();
  drawBird();
}

// ===== 主遊戲 loop =====
function gameLoop() {
  if (!state.running) return;
  state.frame++;

  // Space按住=專注升，放開=專注降
  if (state.spacePressed) {
    state.focusLevel = Math.min(100, state.focusLevel + 1.5);
  } else {
    state.focusLevel = Math.max(0, state.focusLevel - 0.5);
  }

  // 鳥
  updateBird();

  // 金幣
  const cfg = getLevelConfig(state.level);
  state.spawnTimer++;
  if (state.spawnTimer >= cfg.spawnRate) {
    state.spawnTimer = 0;
    spawnCoin();
  }
  updateCoins();

  // 繪畫
  ctx.clearRect(0, 0, W, H);
  drawBackground();
  drawCoins();
  drawBird();
  drawHUD();

  // 失敗條件：飛出頂 + 無專注
  if (state.bird.y <= 30 && state.focusLevel < 5) {
    showGameOver();
    return;
  }

  requestAnimationFrame(gameLoop);
}

// ===== 開始 =====
function startGame() {
  document.getElementById('overlay').classList.add('hidden');
  state.running = true;
  state.gameOver = false;
  state.bird = { x: 100, y: 100, vy: 0 };
  state.coins = [];
  state.spawnTimer = 0;
  state.score = 0;
  state.level = 1;
  state.totalCoins = 0;
  state.comboCount = 0;
  state.focusLevel = 50;
  state.targetFocus = 50;
  state.spacePressed = false;
  gameLoop();
}

// ===== 鍵盤控制 (Space only) =====
document.addEventListener('keydown', (e) => {
  if (e.key === ' ') {
    e.preventDefault();
    if (!state.running) {
      if (state.gameOver) resetGame();
      else startGame();
      return;
    }
    state.spacePressed = true;
  }
});
document.addEventListener('keyup', (e) => {
  if (e.key === ' ') {
    e.preventDefault();
    state.spacePressed = false;
  }
});

// Touch support for mobile
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (!state.running) {
    if (state.gameOver) resetGame();
    else startGame();
  } else {
    state.spacePressed = true;
  }
});
canvas.addEventListener('touchend', (e) => {
  e.preventDefault();
  state.spacePressed = false;
});
canvas.addEventListener('touchcancel', (e) => {
  state.spacePressed = false;
});

// Mouse support
canvas.addEventListener('mousedown', (e) => {
  if (!state.running) {
    if (state.gameOver) resetGame();
    else startGame();
  } else {
    state.spacePressed = true;
  }
});
canvas.addEventListener('mouseup', () => { state.spacePressed = false; });
canvas.addEventListener('mouseleave', () => { state.spacePressed = false; });

// ===== Start button =====
document.getElementById('startBtn').onclick = startGame;

// ===== 初始化畫面 =====
drawBackground();
drawBird();
</script>
</body>
</html>
