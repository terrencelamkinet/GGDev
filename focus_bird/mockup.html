<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Focus Bird — Design Mockup</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    font-family: 'Segoe UI', sans-serif;
    color: #fff;
    padding: 30px 20px;
  }
  h1 { margin-bottom: 8px; }
  .sub { opacity: 0.5; margin-bottom: 24px; font-size: 14px; }
  
  .game-frame {
    position: relative;
    width: 400px;
    height: 500px;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(0,0,0,0.5);
    background: #87CEEB; /* fallback */
  }
  
  /* ============= THE DESIGN ============= */
  .scene {
    position: absolute;
    inset: 0;
  }
  
  /* Sky gradient */
  .sky {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, #4a90d9 0%, #87CEEB 40%, #B0E0FF 65%, #C8E6C9 100%);
  }
  
  /* Clouds */
  .cloud {
    position: absolute;
    background: rgba(255,255,255,0.6);
    border-radius: 50%;
  }
  .cloud-1 { width: 80px; height: 30px; top: 40px; left: 50px; }
  .cloud-1::before { content: ''; position: absolute; width: 40px; height: 40px; background: rgba(255,255,255,0.6); border-radius: 50%; top: -20px; left: 15px; }
  .cloud-2 { width: 70px; height: 25px; top: 70px; left: 160px; }
  .cloud-2::before { content: ''; position: absolute; width: 35px; height: 35px; background: rgba(255,255,255,0.6); border-radius: 50%; top: -18px; left: 10px; }
  .cloud-3 { width: 90px; height: 32px; top: 30px; left: 290px; }
  .cloud-3::before { content: ''; position: absolute; width: 45px; height: 42px; background: rgba(255,255,255,0.6); border-radius: 50%; top: -22px; left: 20px; }
  
  /* Sun */
  .sun {
    position: absolute;
    width: 50px; height: 50px;
    background: radial-gradient(circle, #FFF3B0, #FFD54F);
    border-radius: 50%;
    top: 35px; left: 315px;
    box-shadow: 0 0 30px rgba(255, 243, 176, 0.4);
  }
  
  /* Mountains */
  .mountain-range {
    position: absolute;
    bottom: 80px;
    width: 100%;
    height: 120px;
  }
  .mountain-1 {
    position: absolute;
    bottom: 0;
    width: 0; height: 0;
    border-left: 60px solid transparent;
    border-right: 40px solid transparent;
    border-bottom: 90px solid #7CB342;
    left: 0;
  }
  .mountain-2 {
    position: absolute;
    bottom: 0;
    width: 0; height: 0;
    border-left: 50px solid transparent;
    border-right: 60px solid transparent;
    border-bottom: 120px solid #689F38;
    left: 70px;
  }
  .mountain-3 {
    position: absolute;
    bottom: 0;
    width: 0; height: 0;
    border-left: 40px solid transparent;
    border-right: 50px solid transparent;
    border-bottom: 100px solid #7CB342;
    left: 150px;
  }
  .mountain-4 {
    position: absolute;
    bottom: 0;
    width: 0; height: 0;
    border-left: 55px solid transparent;
    border-right: 45px solid transparent;
    border-bottom: 110px solid #558B2F;
    left: 230px;
  }
  .mountain-5 {
    position: absolute;
    bottom: 0;
    width: 0; height: 0;
    border-left: 45px solid transparent;
    border-right: 50px solid transparent;
    border-bottom: 80px solid #689F38;
    left: 310px;
  }
  
  /* River */
  .river {
    position: absolute;
    bottom: 25px;
    width: 100%;
    height: 30px;
    background: linear-gradient(180deg, rgba(66,165,245,0.2), rgba(66,165,245,0.35));
  }
  .river-shine {
    position: absolute;
    height: 3px;
    background: rgba(255,255,255,0.25);
    border-radius: 2px;
    bottom: 8px;
    animation: shineMove 2s ease-in-out infinite;
  }
  @keyframes shineMove {
    0%, 100% { left: 30px; width: 20px; }
    50% { left: 200px; width: 40px; }
  }
  
  /* Ground */
  .ground {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 25px;
    background: linear-gradient(180deg, #66BB6A, #4CAF50);
    border-top: 3px solid #388E3C;
  }
  .grass {
    position: absolute;
    top: -6px;
    width: 100%;
    height: 8px;
    background: repeating-linear-gradient(90deg, transparent 0px, transparent 10px, #43A047 10px, #43A047 12px);
    opacity: 0.6;
  }
  
  /* Flowers */
  .flower {
    position: absolute;
    bottom: 20px;
  }
  .flower-stem {
    width: 2px; height: 12px;
    background: #388E3C;
    margin: 0 auto;
  }
  .flower-head {
    width: 10px; height: 10px;
    border-radius: 50%;
    margin: 0 auto -2px;
    position: relative;
  }
  .flower-head::before, .flower-head::after {
    content: '';
    position: absolute;
    width: 6px; height: 6px;
    border-radius: 50%;
    top: -3px;
  }
  .flower-head::before { left: -4px; }
  .flower-head::after { right: -4px; }
  .flower-1 { left: 30px; } .flower-1 .flower-head { background: #E91E63; }
  .flower-2 { left: 100px; } .flower-2 .flower-head { background: #FFEB3B; }
  .flower-3 { left: 170px; } .flower-3 .flower-head { background: #FF5722; }
  .flower-4 { left: 250px; } .flower-4 .flower-head { background: #9C27B0; }
  .flower-5 { left: 330px; } .flower-5 .flower-head { background: #E91E63; }
  .flower-6 { left: 380px; } .flower-6 .flower-head { background: #FF9800; }
  
  /* Coin hint zone */
  .coin-zone {
    position: absolute;
    bottom: 25px;
    width: 100%;
    height: 5px;
    background: rgba(255, 215, 0, 0.2);
  }
  
  /* ===== BIRD (centerpiece) ===== */
  .bird {
    position: absolute;
    left: 100px;
    top: 100px;
    width: 40px;
    height: 30px;
    transition: top 0.3s;
  }
  .bird-body {
    position: absolute;
    width: 36px; height: 22px;
    background: linear-gradient(135deg, #e17055, #d35400);
    border-radius: 50%;
    top: 4px;
  }
  .bird-head {
    position: absolute;
    width: 16px; height: 14px;
    background: #e17055;
    border-radius: 50%;
    top: 2px;
    left: 20px;
  }
  .bird-eye {
    position: absolute;
    width: 5px; height: 5px;
    background: #2d3436;
    border-radius: 50%;
    top: 4px;
    left: 28px;
  }
  .bird-eye-white {
    position: absolute;
    width: 2px; height: 2px;
    background: #fff;
    border-radius: 50%;
    top: 3px;
    left: 30px;
  }
  .bird-beak {
    position: absolute;
    width: 0; height: 0;
    border-top: 4px solid transparent;
    border-bottom: 4px solid transparent;
    border-left: 8px solid #fdcb6e;
    top: 6px;
    left: 32px;
  }
  .bird-wing {
    position: absolute;
    width: 24px; height: 14px;
    background: #c0392b;
    border-radius: 50% 50% 0 50%;
    top: 6px;
    left: 4px;
    transform: rotate(10deg);
    animation: flap 0.4s ease-in-out infinite alternate;
  }
  @keyframes flap {
    0% { transform: rotate(10deg) scaleY(1); }
    100% { transform: rotate(-10deg) scaleY(0.7); }
  }
  .bird-focus-ring {
    position: absolute;
    width: 54px; height: 54px;
    border: 2px solid rgba(72, 219, 251, 0.3);
    border-radius: 50%;
    top: -12px;
    left: -7px;
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.3; }
    50% { transform: scale(1.1); opacity: 0.6; }
  }
  
  /* Coin */
  .coin-example {
    position: absolute;
    width: 26px; height: 26px;
    background: radial-gradient(circle at 35% 35%, #ffeaa7, #fdcb6e 60%, #d68910);
    border-radius: 50%;
    border: 2px solid #b8860b;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: bold;
    color: #b8860b;
    animation: coinFloat 1.5s ease-in-out infinite;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  }
  .coin-eg-1 { bottom: 22px; left: 60px; animation-delay: 0s; }
  .coin-eg-2 { bottom: 22px; left: 140px; animation-delay: 0.5s; }
  .coin-eg-3 { bottom: 22px; left: 220px; animation-delay: 1s; }
  .coin-eg-4 { bottom: 22px; left: 300px; animation-delay: 1.5s; }
  @keyframes coinFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-4px); }
  }
  
  /* ===== HUD ===== */
  .hud {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 10px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    pointer-events: none;
    font-size: 15px;
    text-shadow: 0 2px 6px rgba(0,0,0,0.5);
  }
  .hud-left { display: flex; gap: 14px; align-items: center; }
  .hud-right { display: flex; gap: 8px; align-items: center; }
  
  .focus-bar-bg {
    width: 100px;
    height: 12px;
    background: rgba(255,255,255,0.15);
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.15);
  }
  .focus-bar-fill {
    height: 100%;
    width: 50%;
    background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb);
    border-radius: 10px;
  }
  .label-focus { font-size: 11px; opacity: 0.7; }
  
  /* ===== Overlay ===== */
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    gap: 10px;
    padding: 20px;
  }
  .overlay-bg {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.55);
  }
  .overlay-content { position: relative; z-index: 1; }
  .overlay h1 { font-size: 34px; margin-bottom: 4px; }
  .overlay p { font-size: 15px; opacity: 0.8; max-width: 280px; line-height: 1.5; }
  .overlay .hint { font-size: 13px; opacity: 0.5; margin-top: 4px; }
  .btn {
    margin-top: 10px;
    padding: 12px 44px;
    font-size: 18px;
    border: none;
    border-radius: 14px;
    background: linear-gradient(135deg, #48dbfb, #0abde3);
    color: #1a1a2e;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(72,219,251,0.3);
    transition: transform 0.15s;
  }
  .btn:hover { transform: scale(1.05); }
  
  .space-hint-bottom {
    position: absolute;
    bottom: 55px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.5);
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 12px;
    border: 1px solid rgba(255,255,255,0.08);
    pointer-events: none;
  }
  
  .credits {
    position: absolute;
    bottom: 6px;
    right: 12px;
    font-size: 10px;
    opacity: 0.3;
    pointer-events: none;
  }
  
  .tag {
    display: inline-block;
    margin-top: 20px;
    padding: 6px 14px;
    background: rgba(72,219,251,0.15);
    border-radius: 8px;
    font-size: 13px;
    color: #48dbfb;
  }
</style>
</head>
<body>

<h1>🦅 Focus Bird — Design Mockup</h1>
<p class="sub">參考 Birdy Bird 風格 · 2D flat vector · 確認後 deploy</p>

<div class="game-frame">

  <!-- === SCENE === -->
  <div class="scene">
    <div class="sky"></div>
    <div class="cloud cloud-1"></div>
    <div class="cloud cloud-2"></div>
    <div class="cloud cloud-3"></div>
    <div class="sun"></div>
    
    <div class="mountain-range">
      <div class="mountain-1"></div>
      <div class="mountain-2"></div>
      <div class="mountain-3"></div>
      <div class="mountain-4"></div>
      <div class="mountain-5"></div>
    </div>
    
    <div class="river">
      <div class="river-shine"></div>
    </div>
    
    <div class="ground">
      <div class="grass"></div>
    </div>
    
    <div class="coin-zone"></div>
    
    <div class="flower flower-1"><div class="flower-head"></div><div class="flower-stem"></div></div>
    <div class="flower flower-2"><div class="flower-head"></div><div class="flower-stem"></div></div>
    <div class="flower flower-3"><div class="flower-head"></div><div class="flower-stem"></div></div>
    <div class="flower flower-4"><div class="flower-head"></div><div class="flower-stem"></div></div>
    <div class="flower flower-5"><div class="flower-head"></div><div class="flower-stem"></div></div>
    <div class="flower flower-6"><div class="flower-head"></div><div class="flower-stem"></div></div>
    
    <!-- Example coins on ground -->
    <div class="coin-example coin-eg-1">$</div>
    <div class="coin-example coin-eg-2">$</div>
    <div class="coin-example coin-eg-3">$</div>
    <div class="coin-example coin-eg-4">$</div>
    
    <!-- BIRD -->
    <div class="bird">
      <div class="bird-body"></div>
      <div class="bird-head"></div>
      <div class="bird-eye"></div>
      <div class="bird-eye-white"></div>
      <div class="bird-beak"></div>
      <div class="bird-wing"></div>
      <div class="bird-focus-ring"></div>
    </div>
  </div>
  
  <!-- === HUD === -->
  <div class="hud">
    <div class="hud-left">
      <span>💰 0</span>
      <span>⭐ Lv.1</span>
      <span style="font-size:14px;">0/30</span>
    </div>
    <div class="hud-right">
      <span class="label-focus">專注</span>
      <div class="focus-bar-bg">
        <div class="focus-bar-fill" style="width:50%"></div>
      </div>
    </div>
  </div>
  
  <!-- === START OVERLAY === -->
  <div class="overlay">
    <div class="overlay-bg"></div>
    <div class="overlay-content">
      <h1>🦅 專注飛鳥</h1>
      <p>拍 Space 下沉食金幣<br>放開 Space 慢慢上浮</p>
      <div class="hint">⎵ Space 下沉 · 預設上升</div>
      <button class="btn">開始遊戲</button>
    </div>
  </div>
  
  <div class="space-hint-bottom">⎵ 拍 Space 下沉 · 預設上升</div>
  <div class="credits">Focus Bird · mockup v1</div>
</div>

<div class="tag">✅ 呢個係 mockup — 確認後我會用 canvas 重現</div>

</body>
</html>
