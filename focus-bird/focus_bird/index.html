<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>專注飛鳥 Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;900&family=Noto+Sans+HK:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Game canvas (always rendered below overlay) -->
<canvas id="gc"></canvas>

<!-- HUD bar -->
<div id="hud">
  <div id="hud-left">
    <div class="badge" id="b-stage">第1層</div>
    <div class="badge" id="b-level">第1關</div>
    <div class="badge" id="b-score">0分</div>
    <div class="badge" id="b-goal">0/10</div>
    <div class="badge" id="b-time">00:00</div>
    <div class="badge" id="b-combo" style="display:none;color:#ffd166">連擊x1</div>
  </div>
  <div id="hud-right">
    <div id="fbar-wrap">
      <span style="font-size:12px;font-weight:800;opacity:.85">專注度</span>
      <div id="fbar-track"><div id="fbar-fill"></div></div>
      <span id="fpct" style="font-size:12px;font-weight:800">50%</span>
      <div id="ws-dot"></div>
      <span id="ws-status" style="font-size:16px;margin-left:4px;cursor:help" title="🟢=live 🟡=stale 🔴=no device">⚫</span>
      <span id="device-status" style="font-size:10px;margin-left:6px;font-weight:700;color:#9bbfd4"></span>
    </div>
  </div>
</div>

<!-- Debug panel (press D to toggle) -->
<div id="dbg" style="display:none;position:fixed;bottom:10px;left:10px;z-index:99;
  background:rgba(0,0,0,.85);border:1px solid rgba(255,255,255,.2);border-radius:10px;
  padding:10px 14px;font-family:monospace;font-size:12px;line-height:1.6;min-width:200px;
  color:#9bbfd4;pointer-events:none">
  <div style="font-weight:900;color:#ffd166;margin-bottom:4px">⚙ WS Debug</div>
  <div>WS: <span id="dbg-ws">disconnected</span></div>
  <div>Att: <span id="dbg-att">-</span> &nbsp; Sig: <span id="dbg-sig">-</span></div>
  <div>extMode: <span id="dbg-ext">false</span> &nbsp; dev: <span id="dbg-dev">-</span> eeg: <span id="dbg-eeg">-</span></div>
  <div>msgs: <span id="dbg-msgs">0</span> &nbsp; errs: <span id="dbg-errs">0</span></div>
  <div>last: <span id="dbg-last">-</span>s ago &nbsp; sig: <span id="dbg-sigv">-</span></div>
  <div>URL: wss://brainlink.kinet-poc.com/game</div>
  <div style="margin-top:6px;border-top:1px solid rgba(255,255,255,.15);padding-top:6px;font-size:11px;font-family:monospace" id="dbg-log"></div>
</div>

<!-- Corner buttons -->
<button class="ibtn" id="btnMenu" style="display:none">&#9776;</button>
<button class="ibtn" id="btnMute">&#9834;</button>
<button class="ibtn" id="btnFS">&#9634;</button>

<!-- Overlay (menu/screens) -->
<div id="ov">
  <div class="card" id="mc"></div>
</div>

<!-- ================================================================
     Scripts: load order matters (v8 — cache bust)
     1. audio.js  — Audio engine (no deps)
     2. game.js   — Canvas engine + G state (needs Audio)
     3. ws.js     — WebSocket bridge (needs G)
     4. ui.js     — UI screens (needs G, Audio, WS, STAGES, ageProfile)
     ================================================================ -->
<script src="audio.js"></script>
<script src="game.js"></script>
<script src="ws.js"></script>
<script src="ui.js"></script>

<script>
/* ================================================================
   BOOT — runs after all modules loaded
   ================================================================ */

/* Fullscreen toggle */
function toggleFS() {
  if (!document.fullscreenElement)
    document.documentElement.requestFullscreen().catch(()=>{});
  else
    document.exitFullscreen().catch(()=>{});
}

document.getElementById('btnFS').onclick   = toggleFS;
document.getElementById('btnMenu').onclick = () => { G.running=false; UI.showMain(); };
document.getElementById('btnMute').onclick = () => {
  const m = !Audio.isMuted();
  Audio.setMuted(m);
  document.getElementById('btnMute').textContent = m ? '\u{1F507}' : '\u266A';
  UI.toast(m ? '靜音' : '音效開啟');
};

/* Keyboard */
document.addEventListener('keydown', e => {
  if (e.key === 'F11'){ e.preventDefault(); toggleFS(); }
  if (e.key === 'Escape' && G.running) { G.running=false; UI.showMain(); }
  if (e.key === 'd' || e.key === 'D') {
    const dbg = document.getElementById('dbg');
    if (dbg) dbg.style.display = dbg.style.display === 'none' ? 'block' : 'none';
  }
});

/* Touch (game canvas) — disabled, focus-only mode */
canvas.addEventListener('touchstart', e=>{ e.preventDefault(); Audio.resume(); }, {passive:false});

/* Double-click fullscreen */
document.addEventListener('dblclick', toggleFS);

/* Start */
WS.connect();
UI.showMain();
</script>

<div style="position:fixed;bottom:4px;right:8px;font-size:10px;color:rgba(255,255,255,.25);font-family:monospace;z-index:9999;pointer-events:none">Focus Bird · v02 · pure focus mode</div>

</body>
