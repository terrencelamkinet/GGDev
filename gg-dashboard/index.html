<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>GG Dashboard</title>
<link rel="stylesheet" href="styles.css">
<style>
  /* Inline critical styles for first paint */
  #lockScreen { position:fixed; top:0; left:0; right:0; bottom:0; z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; background:linear-gradient(180deg,#1a1a2e,#16213e,#0f3460); }
  #container { display:none; width:100%; max-width:430px; margin:0 auto; }
  #container.unlocked { display:block; }
  .tab-page { display:none; padding:0 16px 20px; }
  .tab-page.active { display:block; }
  .shimmer-placeholder { height:80px; background:linear-gradient(90deg, rgba(128,128,128,0.1) 25%, rgba(128,128,128,0.05) 50%, rgba(128,128,128,0.1) 75%); background-size:200% 100%; animation: shimmerAnim 1.5s ease-in-out infinite; border-radius:10px; margin-bottom:12px; }
  @keyframes shimmerAnim { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
</style>
</head>
<body>

<!-- ===== LOCK SCREEN ===== -->
<div id="lockScreen">
  <div class="lock-time" id="lockTime">--:--</div>
  <div class="lock-date" id="lockDate">-- 月 -- 日</div>
  <div class="lock-avatar" id="lockAvatar">GG</div>
  <div class="lock-name" id="lockName">GG Dashboard</div>
  <div class="lock-sub">輸入密碼解鎖</div>
  <form id="lockForm" onsubmit="return handleLockSubmit(event)">
    <div class="lock-input-wrap">
      <input type="password" id="lockInput" inputmode="numeric" pattern="[0-9]*" maxlength="6" placeholder="••••••" autocomplete="off">
    </div>
  </form>
  <div class="lock-error" id="lockError">密碼錯誤，請再試一次</div>
  <div class="lock-biometry" id="lockBio">&#x1F5A5;</div>
</div>

<!-- ===== MAIN APP ===== -->
<div id="container">

  <!-- Header -->
  <div class="ios-header">
    <div>
      <div class="ios-header-title">Dashboard</div>
      <div class="ios-header-sub" id="headerSub">載入中...</div>
    </div>
    <div class="ios-header-right">
      <span class="ios-status-dot online" id="statusDot"></span>
    </div>
  </div>

  <!-- ===== TAB: HOME ===== -->
  <div class="tab-page active" id="tabHome">

    <div class="ios-card">
      <div class="ios-card-header">今日概覽</div>
      <div class="ios-report-text" id="dailyReport">載入中...</div>
    </div>

    <div class="ios-card">
      <div class="ios-card-header">今日行程</div>
      <div class="timeline" id="todaySchedule">
        <div class="shimmer-placeholder"></div>
      </div>
    </div>

  </div>

  <!-- ===== TAB: AGENTS ===== -->
  <div class="tab-page" id="tabAgents">

    <div class="section-label">Agent 團隊</div>
    <div id="agentList">
      <div class="shimmer-placeholder"></div>
      <div class="shimmer-placeholder"></div>
      <div class="shimmer-placeholder"></div>
    </div>

    <!-- Agent Thoughts -->
    <div class="section-label" style="margin-top:16px">Agent 思維</div>
    <div class="ios-card" id="agentThoughtsCard">
      <div id="hThoughts"></div>
      <div id="wThoughts"></div>
      <div id="pThoughts"></div>
    </div>

    <!-- Agent Needs -->
    <div class="section-label">Agent 需求</div>
    <div class="ios-card" id="agentNeedsCard">
      <div id="hNeeds"></div>
      <div id="pNeeds"></div>
    </div>

    <!-- Agent Growth -->
    <div class="section-label">學習 &amp; 不確定性</div>
    <div class="ios-card" id="agentGrowthCard">
      <div id="hLearnings"></div>
      <div id="hUncertainties"></div>
    </div>

  </div>

  <!-- ===== TAB: PERSONAL ===== -->
  <div class="tab-page" id="tabPersonal">

    <div class="profile-header">
      <div class="profile-avatar-large" id="pAvatar">GG</div>
      <div class="profile-name" id="pName">--</div>
      <div class="profile-role" id="pRole">--</div>
    </div>

    <div class="ios-card">
      <div class="ios-card-header">個人資料</div>
      <div class="ios-row"><span class="ios-row-label">電郵</span><span class="ios-row-value" id="pEmail">--</span></div>
      <div class="ios-row"><span class="ios-row-label">電話</span><span class="ios-row-value" id="pPhone">--</span></div>
      <div class="ios-row"><span class="ios-row-label">團隊</span><span class="ios-row-value" id="pTeam">--</span></div>
    </div>

    <div class="profile-stats-grid" id="pStatsGrid">
      <div class="profile-stat-card"><div class="profile-stat-value">--</div><div class="profile-stat-label">--</div></div>
      <div class="profile-stat-card"><div class="profile-stat-value">--</div><div class="profile-stat-label">--</div></div>
      <div class="profile-stat-card"><div class="profile-stat-value">--</div><div class="profile-stat-label">--</div></div>
    </div>

  </div>

  <!-- ===== TAB: COST ===== -->
  <div class="tab-page" id="tabCost">

    <div class="ios-card">
      <div class="ios-card-header">成本摘要</div>
      <div class="cost-summary" id="costSummary">
        <div class="cost-summary-item"><div class="cost-summary-value">--</div><div class="cost-summary-label">總成本</div></div>
        <div class="cost-summary-item"><div class="cost-summary-value">--</div><div class="cost-summary-label">預算</div></div>
        <div class="cost-summary-item"><div class="cost-summary-value">--</div><div class="cost-summary-label">效率</div></div>
      </div>
    </div>

    <div class="ios-card">
      <div class="ios-card-header">Agent 成本分佈</div>
      <div id="costAgentList">
        <div class="shimmer-placeholder"></div>
      </div>
      <div class="section-divider"></div>
      <div style="margin-top:8px">
        <canvas id="costChart" width="350" height="180" style="width:100%;height:180px;border-radius:8px;"></canvas>
      </div>
    </div>

  </div>

  <!-- ===== TAB: LAST UPDATE ===== -->
  <div class="tab-page" id="tabLastUpdate">
    <div class="update-section">
      <div class="update-icon">&#x2705;</div>
      <div class="update-label">最後更新</div>
      <div class="update-time" id="lastUpdateTime">--</div>
    </div>
  </div>

</div>

<!-- ===== BOTTOM TAB BAR ===== -->
<div class="ios-tab-bar" id="tabBar">
  <button class="ios-tab-item active" data-tab="tabHome">
    <span class="ios-tab-icon">&#x1F3E0;</span>
    <span class="ios-tab-label">Home</span>
  </button>
  <button class="ios-tab-item" data-tab="tabAgents">
    <span class="ios-tab-icon">&#x1F465;</span>
    <span class="ios-tab-label">Agents</span>
  </button>
  <button class="ios-tab-item" data-tab="tabPersonal">
    <span class="ios-tab-icon">&#x1F464;</span>
    <span class="ios-tab-label">Profile</span>
  </button>
  <button class="ios-tab-item" data-tab="tabCost">
    <span class="ios-tab-icon">&#x1F4B0;</span>
    <span class="ios-tab-label">Cost</span>
  </button>
</div>

<script>
/* ============================================
   GG Dashboard - Main Application Script
   ============================================ */

// --- Lock Screen ---
var lockCode = localStorage.getItem('gg_lock') || '1234';
var lockAttempts = 0;

function handleLockSubmit(e) {
  e.preventDefault();
  var input = document.getElementById('lockInput');
  var val = input.value;
  var err = document.getElementById('lockError');
  if (val === lockCode) {
    document.getElementById('lockScreen').classList.add('hidden');
    document.getElementById('container').classList.add('unlocked');
    err.classList.remove('show');
    input.value = '';
    fetchData();
    startAutoRefresh();
  } else {
    lockAttempts++;
    err.classList.add('show');
    input.value = '';
    input.focus();
  }
  return false;
}

// Show time on lock screen
function updateLockTime() {
  var now = new Date();
  var h = String(now.getHours()).padStart(2,'0');
  var m = String(now.getMinutes()).padStart(2,'0');
  document.getElementById('lockTime').textContent = h + ':' + m;
  var months = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
  var days = ['日','一','二','三','四','五','六'];
  document.getElementById('lockDate').textContent = months[now.getMonth()] + ' ' + now.getDate() + '日 星期' + days[now.getDay()];
}
updateLockTime();
setInterval(updateLockTime, 30000);

document.getElementById('lockInput').addEventListener('input', function() {
  if (this.value.length >= 4) {
    document.getElementById('lockForm').dispatchEvent(new Event('submit'));
  }
});

// Biometry button
document.getElementById('lockBio').addEventListener('click', function() {
  document.getElementById('lockInput').value = lockCode;
  document.getElementById('lockForm').dispatchEvent(new Event('submit'));
});

// --- Tabs ---
var tabButtons = document.querySelectorAll('.ios-tab-item');
tabButtons.forEach(function(btn) {
  btn.addEventListener('click', function() {
    var tabId = this.getAttribute('data-tab');
    tabButtons.forEach(function(b) { b.classList.remove('active'); });
    this.classList.add('active');
    document.querySelectorAll('.tab-page').forEach(function(p) { p.classList.remove('active'); });
    var target = document.getElementById(tabId);
    if (target) target.classList.add('active');
  });
});

// --- Helpers ---
function escHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '\x26amp;')
    .replace(/</g, '\x3C')
    .replace(/>/g, '\x3E')
    .replace(/"/g, '\x26quot;')
    .replace(/'/g, '\x26#39;');
}

function setVal(id, val, suffix) {
  var el = document.getElementById(id);
  if (!el) return;
  el.textContent = (val != null ? val : '--') + (suffix || '');
}

function setDetail(id, html) {
  var el = document.getElementById(id);
  if (!el) return;
  el.innerHTML = html;
}

function setSysTag(id, text, type) {
  var el = document.getElementById(id);
  if (!el) return;
  el.textContent = text || '';
  if (type) el.className = 'ios-status-dot ' + type;
}

function setAgentTag(id, text) {
  var el = document.getElementById(id);
  if (!el) return;
  el.textContent = text || '';
}

function renderCostChart(data) {
  var canvas = document.getElementById('costChart');
  if (!canvas || !data || !data.length) return;
  var ctx = canvas.getContext('2d');
  var dpr = window.devicePixelRatio || 1;
  var rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  var w = rect.width, h = rect.height;
  var pad = { top: 10, bottom: 20, left: 10, right: 10 };
  var chartW = w - pad.left - pad.right;
  var chartH = h - pad.top - pad.bottom;
  var maxVal = Math.max.apply(null, data.map(function(d) { return Math.max(d.cost || 0, d.budget || 0); }));
  if (maxVal === 0) maxVal = 1;
  var barW = chartW / data.length * 0.6;
  var gap = chartW / data.length * 0.4;
  var colors = ['#007aff', '#34c759', '#ff9500', '#af52de', '#ff3b30'];
  ctx.clearRect(0, 0, w, h);
  data.forEach(function(item, i) {
    var x = pad.left + i * (barW + gap) + gap * 0.5;
    var costH = (item.cost / maxVal) * chartH;
    var budgH = (item.budget / maxVal) * chartH;
    var yBase = pad.top + chartH;
    // budget bar (lighter)
    ctx.fillStyle = colors[i % colors.length] + '33';
    ctx.beginPath();
    ctx.roundRect(x, yBase - budgH, barW, budgH, [3,3,0,0]);
    ctx.fill();
    // cost bar
    ctx.fillStyle = colors[i % colors.length];
    ctx.beginPath();
    ctx.roundRect(x + 2, yBase - costH, barW - 4, costH, [2,2,0,0]);
    ctx.fill();
    // label
    ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--text-tertiary').trim() || '#8e8e93';
    ctx.font = '10px -apple-system, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(item.agent, x + barW / 2, h - 4);
  });
}

// roundRect polyfill for canvas
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, radii) {
    var r = Array.isArray(radii) ? radii : [radii, radii, radii, radii];
    var tl = r[0] || 0, tr = r[1] || 0, br = r[2] || 0, bl = r[3] || 0;
    this.moveTo(x + tl, y);
    this.lineTo(x + w - tr, y);
    this.quadraticCurveTo(x + w, y, x + w, y + tr);
    this.lineTo(x + w, y + h - br);
    this.quadraticCurveTo(x + w, y + h, x + w - br, y + h);
    this.lineTo(x + bl, y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - bl);
    this.lineTo(x, y + tl);
    this.quadraticCurveTo(x, y, x + tl, y);
    this.closePath();
    return this;
  };
}

// --- Agent Card Expansion ---
function setupAgentCards() {
  document.querySelectorAll('.agent-card-header').forEach(function(h) {
    h.addEventListener('click', function() {
      var card = this.closest('.agent-card');
      if (card) card.classList.toggle('expanded');
    });
  });
}

// --- Fetch Data ---
function fetchData() {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', 'gg-data.json', true);
  xhr.onload = function() {
    if (xhr.status === 200) {
      try {
        var d = JSON.parse(xhr.responseText);
        renderData(d);
      } catch(e) {
        console.log('JSON parse error', e);
      }
    }
  };
  xhr.onerror = function() {
    console.log('Fetch error');
  };
  xhr.send();
}

function renderData(d) {
  if (!d) return;

  // Header
  var sub = document.getElementById('headerSub');
  if (sub) sub.textContent = d.name || 'GG Dashboard';

  // Status dot
  var dot = document.getElementById('statusDot');
  if (dot) dot.className = 'ios-status-dot ' + (d.status || 'online');

  // --- HOME TAB ---
  // Daily report
  var report = document.getElementById('dailyReport');
  if (report) report.textContent = d.dailyReport || '暫無報告';

  // Schedule - READ FROM DATA, NO HARDCODING
  var sc = document.getElementById('todaySchedule');
  if (sc) {
    if (d.schedule && d.schedule.length) {
      sc.innerHTML = d.schedule.map(function(s, idx) {
        var statusClass = '';
        // Determine dot status based on time
        if (s.time) {
          var now = new Date();
          var parts = s.time.split(':');
          var eventHour = parseInt(parts[0], 10);
          var eventMin = parseInt(parts[1], 10);
          var currentHour = now.getHours();
          var currentMin = now.getMinutes();
          var eventTotal = eventHour * 60 + eventMin;
          var currentTotal = currentHour * 60 + currentMin;
          if (eventTotal < currentTotal) statusClass = 'past';
          else if (eventTotal <= currentTotal + 60) statusClass = 'current';
          else statusClass = 'upcoming';
        }
        var locHtml = s.location ? '<div class="timeline-desc">' + escHtml(s.location) + '</div>' : '';
        return '<div class="timeline-item">' +
          '<span class="timeline-time">' + escHtml(s.time) + '</span>' +
          '<span class="timeline-dot ' + statusClass + '"></span>' +
          '<div class="timeline-info">' +
          '<div class="timeline-title">' + escHtml(s.title) + '</div>' +
          locHtml + '</div></div>';
      }).join('');
    } else {
      sc.innerHTML = '<div class="ios-row"><span class="ios-row-label" style="color:var(--text-tertiary)">今日無行程</span></div>';
    }
  }

  // --- AGENTS TAB ---
  // Agent list cards
  var agentList = document.getElementById('agentList');
  if (agentList && d.agents && d.agents.length) {
    agentList.innerHTML = d.agents.map(function(a) {
      var statusBadge = a.status || 'active';
      var avatarClasses = 'agent-avatar';
      if (a.id) avatarClasses += ' ' + a.id;

      // Stats
      var statsHtml = '';
      if (a.stats) {
        statsHtml = '<div class="agent-stats-grid">' +
          Object.keys(a.stats).map(function(k) {
            return '<div class="agent-stat-item"><div class="agent-stat-value">' +
              escHtml(String(a.stats[k])) + '</div><div class="agent-stat-label">' +
              escHtml(k) + '</div></div>';
          }).join('') + '</div>';
      }

      // Tags
      var tagsHtml = '';
      if (a.tags && a.tags.length) {
        tagsHtml = '<div class="agent-tags">' +
          a.tags.map(function(t) { return '<span class="agent-tag">' + escHtml(t) + '</span>'; }).join('') +
          '</div>';
      }

      // Thoughts
      var thoughtHtml = '';
      if (a.thoughts) {
        thoughtHtml += '<div class="agent-thought-section"><div class="agent-thought-label">想法</div><div class="agent-thought-text">' + escHtml(a.thoughts) + '</div></div>';
      }
      if (a.needs) {
        thoughtHtml += '<div class="agent-thought-section"><div class="agent-thought-label">需求</div><div class="agent-thought-text">' + escHtml(a.needs) + '</div></div>';
      }
      if (a.learnings) {
        thoughtHtml += '<div class="agent-thought-section"><div class="agent-thought-label">學習</div><div class="agent-thought-text">' + escHtml(a.learnings) + '</div></div>';
      }
      if (a.uncertainties) {
        thoughtHtml += '<div class="agent-thought-section"><div class="agent-thought-label">不確定性</div><div class="agent-thought-text">' + escHtml(a.uncertainties) + '</div></div>';
      }

      return '<div class="agent-card">' +
        '<div class="agent-card-header">' +
        '<div class="' + avatarClasses + '">' + escHtml((a.name || '?')[0]) + '</div>' +
        '<div class="agent-meta">' +
        '<div class="agent-name">' + escHtml(a.name) + '</div>' +
        '<div class="agent-role">' + escHtml(a.role) + '</div></div>' +
        '<span class="agent-status-badge ' + statusBadge + '">' +
        (statusBadge === 'active' ? 'Active' : statusBadge === 'idle' ? 'Idle' : statusBadge) + '</span>' +
        '<span class="agent-expand-icon">&#x25BC;</span></div>' +
        '<div class="agent-card-body"><div class="agent-card-body-inner">' +
        tagsHtml + statsHtml + thoughtHtml + '</div></div></div>';
    }).join('');
    setupAgentCards();
  }

  // Agent Thoughts section
  var hThoughts = document.getElementById('hThoughts');
  var wThoughts = document.getElementById('wThoughts');
  var pThoughts = document.getElementById('pThoughts');

  if (hThoughts && d.agents) {
    var thoughtsList = d.agents.filter(function(a) { return a.thoughts; });
    hThoughts.innerHTML = thoughtsList.length ? thoughtsList.map(function(a) {
      return '<div class="agent-thought-section"><span style="font-weight:600">' + escHtml(a.name) + ':</span> ' + escHtml(a.thoughts) + '</div>';
    }).join('') : '<div class="text-tertiary" style="font-size:14px">暫無想法</div>';
  }
  if (wThoughts) wThoughts.style.display = 'none';
  if (pThoughts) pThoughts.style.display = 'none';

  // Agent Needs section
  var hNeeds = document.getElementById('hNeeds');
  var pNeeds = document.getElementById('pNeeds');
  if (hNeeds && d.agents) {
    var needsList = d.agents.filter(function(a) { return a.needs; });
    hNeeds.innerHTML = needsList.length ? needsList.map(function(a) {
      return '<div class="agent-thought-section"><span style="font-weight:600">' + escHtml(a.name) + ':</span> ' + escHtml(a.needs) + '</div>';
    }).join('') : '<div class="text-tertiary" style="font-size:14px">暫無需求</div>';
  }
  if (pNeeds) pNeeds.style.display = 'none';

  // Agent Growth section
  var hLearnings = document.getElementById('hLearnings');
  var hUncertainties = document.getElementById('hUncertainties');
  if (hLearnings && d.agents) {
    var learnList = d.agents.filter(function(a) { return a.learnings; });
    hLearnings.innerHTML = '<div class="agent-thought-label">學習所得</div>' +
      (learnList.length ? learnList.map(function(a) {
        return '<div class="agent-thought-text" style="padding:4px 0"><span style="font-weight:600">' + escHtml(a.name) + ':</span> ' + escHtml(a.learnings) + '</div>';
      }).join('') : '<div class="text-tertiary" style="font-size:14px;padding:4px 0">暫無記錄</div>');
  }
  if (hUncertainties && d.agents) {
    var uncerList = d.agents.filter(function(a) { return a.uncertainties; });
    hUncertainties.innerHTML = '<div class="agent-thought-label" style="margin-top:8px">不確定性</div>' +
      (uncerList.length ? uncerList.map(function(a) {
        return '<div class="agent-thought-text" style="padding:4px 0"><span style="font-weight:600">' + escHtml(a.name) + ':</span> ' + escHtml(a.uncertainties) + '</div>';
      }).join('') : '<div class="text-tertiary" style="font-size:14px;padding:4px 0">暫無記錄</div>');
  }

  // --- PERSONAL TAB ---
  if (d.personal) {
    var p = d.personal;
    setVal('pName', p.name);
    setVal('pRole', p.role ? p.role + (p.team ? ' - ' + p.team : '') : '');
    setVal('pEmail', p.email);
    setVal('pPhone', p.phone);
    setVal('pTeam', p.team);
    if (p.avatar) {
      var av = document.getElementById('pAvatar');
      if (av) av.textContent = p.avatar;
    }

    var statsGrid = document.getElementById('pStatsGrid');
    if (statsGrid && p.stats && p.stats.length) {
      statsGrid.innerHTML = p.stats.map(function(s) {
        return '<div class="profile-stat-card"><div class="profile-stat-value">' +
          escHtml(s.value) + '</div><div class="profile-stat-label">' +
          escHtml(s.label) + '</div></div>';
      }).join('');
    }
  }

  // --- COST TAB ---
  if (d.costAnalysis) {
    var c = d.costAnalysis;
    var totalVal = c.totalCost || 0;
    var budgetVal = c.totalBudget || 0;
    var effVal = c.overallEfficiency || 0;

    var summaryEl = document.getElementById('costSummary');
    if (summaryEl) {
      summaryEl.innerHTML =
        '<div class="cost-summary-item"><div class="cost-summary-value">$' +
        (totalVal / 1000).toFixed(1) + 'k</div><div class="cost-summary-label">總成本</div></div>' +
        '<div class="cost-summary-item"><div class="cost-summary-value">$' +
        (budgetVal / 1000).toFixed(1) + 'k</div><div class="cost-summary-label">預算</div></div>' +
        '<div class="cost-summary-item"><div class="cost-summary-value ' +
        (effVal >= 80 ? 'green' : effVal >= 60 ? '' : 'red') + '">' +
        effVal + '%</div><div class="cost-summary-label">效率</div></div>';
    }

    // Agent cost rows
    var costList = document.getElementById('costAgentList');
    if (costList && c.agentCosts && c.agentCosts.length) {
      costList.innerHTML = c.agentCosts.map(function(a) {
        var pct = a.budget > 0 ? Math.round((a.cost / a.budget) * 100) : 0;
        var barClass = pct > 90 ? 'warning' : pct > 75 ? '' : 'good';
        return '<div class="cost-agent-row">' +
          '<div class="cost-agent-name">' + escHtml(a.agent) + '</div>' +
          '<div class="cost-bar-wrap"><div class="cost-bar-fill ' + barClass + '" style="width:' + pct + '%"></div></div>' +
          '<div class="cost-agent-detail">$' + a.cost + ' / $' + a.budget + '</div></div>';
      }).join('');
    }

    // Chart
    if (c.agentCosts) renderCostChart(c.agentCosts);
  }

  // --- LAST UPDATE ---
  var updateEl = document.getElementById('lastUpdateTime');
  if (updateEl) {
    updateEl.textContent = d.time || new Date().toLocaleString('zh-HK');
  }
}

// --- Auto Refresh ---
var refreshInterval = null;
function startAutoRefresh() {
  refreshInterval = setInterval(fetchData, 30000);
}

// --- Key shortcut for re-lock ---
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape' && e.shiftKey) {
    document.getElementById('lockScreen').classList.remove('hidden');
    document.getElementById('container').classList.remove('unlocked');
    document.getElementById('lockInput').focus();
  }
});

// --- Handle visibility change for background refresh ---
document.addEventListener('visibilitychange', function() {
  if (!document.hidden && document.getElementById('container').classList.contains('unlocked')) {
    fetchData();
  }
});

console.log('GG Dashboard loaded - iOS 18 redesign');
</script>
