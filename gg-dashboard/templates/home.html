<!DOCTYPE html><html lang="zh-HK"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="GG Platform">
<title>GG Platform</title><link rel="stylesheet" href="/static/styles.css?v=2.0">
</head><body>
<div class="app-shell">

<!-- iOS Navigation Bar -->
<nav class="nav-bar">
  <div style="display:flex;justify-content:space-between;align-items:flex-start">
    <div>
      <h1 class="page-title">GG Platform</h1>
      <span class="page-subtitle" id="todayDate">Loading...</span>
    </div>
    <div class="nav-actions">
      <span class="nav-action-btn" id="lastUpdate" style="font-size:13px;font-weight:500;width:auto;padding:0 12px;background:var(--fill);border-radius:8px;min-height:36px;display:flex;align-items:center;gap:4px">--:--</span>
      <button class="nav-action-btn" onclick="toggleNotices()" aria-label="Notices">🔔</button>
    </div>
  </div>
</nav>

<!-- Scroll Content -->
<main class="scroll-content">

  <!-- Master Stats — 4 key numbers in iOS grid -->
  <div class="ios-stats">
    <div class="ios-stat"><div class="ios-stat-value accent" id="hTasks">--</div><div class="ios-stat-label">Tasks</div></div>
    <div class="ios-stat"><div class="ios-stat-value red" id="hOverdue">0</div><div class="ios-stat-label">Overdue</div></div>
    <div class="ios-stat"><div class="ios-stat-value gold" id="hUrgent">0</div><div class="ios-stat-label">Urgent</div></div>
    <div class="ios-stat"><div class="ios-stat-value" id="hCpu">--</div><div class="ios-stat-label">CPU</div></div>
  </div>

  <!-- AI Intelligence Section -->
  <div class="ios-section">
    <div class="ios-header">AI Intelligence</div>
    <div class="ios-group">
      <div id="homeSuggestions" style="padding:12px 16px;min-height:44px">
        <div class="ios-caption-1" style="color:var(--secondary-label)">Analyzing...</div>
      </div>
    </div>
  </div>

  <!-- Servants Section -->
  <div class="ios-section">
    <div class="ios-header">Servants</div>
    <div class="ios-group">
      <div class="ios-row" onclick="location.href='/agents/fighter'">
        <span class="dot-breathe" id="fighterDot" style="background:var(--orange);width:12px;height:12px;flex-shrink:0;margin-right:12px"></span>
        <div class="ios-row-content">
          <div class="ios-row-label">Fighter</div>
          <div class="ios-row-meta" id="fighterStatus">Online</div>
        </div>
        <svg class="ios-row-icon"><use href="/static/icons.svg#icon-chevron-right"/></svg>
      </div>
      <div class="ios-row" onclick="location.href='/agents/work'">
        <span class="dot-breathe" id="workDot" style="background:var(--blue);width:12px;height:12px;flex-shrink:0;margin-right:12px"></span>
        <div class="ios-row-content">
          <div class="ios-row-label">Work</div>
          <div class="ios-row-meta" id="workStatus">Online</div>
        </div>
        <svg class="ios-row-icon"><use href="/static/icons.svg#icon-chevron-right"/></svg>
      </div>
      <div class="ios-row" onclick="location.href='/agents/person'">
        <span class="dot-breathe" id="personDot" style="background:var(--pink);width:12px;height:12px;flex-shrink:0;margin-right:12px"></span>
        <div class="ios-row-content">
          <div class="ios-row-label">Person</div>
          <div class="ios-row-meta" id="personStatus">Online</div>
        </div>
        <svg class="ios-row-icon"><use href="/static/icons.svg#icon-chevron-right"/></svg>
      </div>
    </div>
  </div>

</main>

<!-- iOS Tab Bar -->
<nav class="ios-tab-bar">
  <a href="/home" class="ios-tab active"><svg role="img" aria-label="Home"><use href="/static/icons.svg#icon-house"/></svg><span>Home</span></a>
  <a href="/tasks" class="ios-tab"><svg role="img" aria-label="Tasks"><use href="/static/icons.svg#icon-list"/></svg><span>Tasks</span></a>
  <a href="/intel" class="ios-tab"><svg role="img" aria-label="Intel"><use href="/static/icons.svg#icon-brain"/></svg><span>Intel</span></a>
  <a href="/agents" class="ios-tab"><svg role="img" aria-label="Agents"><use href="/static/icons.svg#icon-server"/></svg><span>Agents</span></a>
  <a href="/profile" class="ios-tab"><svg role="img" aria-label="Profile"><use href="/static/icons.svg#icon-user"/></svg><span>Profile</span></a>
</nav>
</div>

<!-- Notices Bar -->
<div id="noticesBar" class="notices-bar">
  <div style="padding:12px 16px;border-bottom:0.5px solid var(--separator);display:flex;justify-content:space-between;align-items:center">
    <span style="font-weight:600;font-size:17px;letter-spacing:-0.41px">Notices</span>
    <button onclick="document.getElementById('noticesBar').style.display='none'" style="cursor:pointer;background:none;border:none;color:var(--secondary-label);font-size:20px;padding:8px;min-width:44px">✕</button>
  </div>
  <div id="noticesList" style="padding:8px 16px;max-height:240px;overflow-y:auto;font-size:15px;color:var(--label);line-height:1.5"></div>
</div>

<!-- Chat bubble -->
<button id="chatBubble" class="chat-bubble" onclick="toggleChat()" aria-label="Chat">🤖</button>
<div id="chatOverlay" class="chat-overlay" style="display:none">
  <div class="chat-overlay-header">
    <span style="font-weight:600;font-size:17px;letter-spacing:-0.41px">Ask GG Fighter</span>
    <button onclick="toggleChat()" style="cursor:pointer;background:none;border:none;color:var(--secondary-label);font-size:18px;padding:8px;min-width:44px">✕</button>
  </div>
  <div id="chatMessages" class="chat-overlay-messages">💬 Hi! What would you like to do?</div>
  <form onsubmit="sendChat();return false" class="chat-overlay-input">
    <input type="text" id="chatInput" placeholder="Ask anything...">
    <button type="submit">Send</button>
  </form>
</div>

<script>
function toggleChat(){var o=document.getElementById('chatOverlay');o.style.display=o.style.display==='none'?'block':'none';}
function sendChat(){var i=document.getElementById('chatInput'),msg=i.value.trim();if(!msg)return;var m=document.getElementById('chatMessages');m.innerHTML+='<div style="text-align:right;margin:2px 0"><span style="background:rgba(108,92,231,0.2);padding:6px 12px;border-radius:10px;display:inline-block;font-size:15px">'+esc(msg)+'</span></div>';i.value='';i.disabled=true;
fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg})}).then(function(r){return r.json()}).then(function(r){m.innerHTML+='<div style="margin:2px 0"><span style="background:var(--fill);padding:6px 12px;border-radius:10px;display:inline-block;font-size:15px">🤖 '+(r.message||'Got it')+'</span></div>';}).catch(function(){}).finally(function(){i.disabled=false;i.focus();});}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&#60;').replace(/>/g,'&#62;');}

function loadHome(){
  fetch('/api/data?_='+Date.now()).then(function(r){return r.json()}).then(function(d){
    var h=new Date().getHours();
    document.querySelector('.page-title').textContent = h<12?'Good Morning':h<18?'Good Afternoon':'Good Evening';
    document.getElementById('todayDate').textContent = new Date().toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric',timeZone:'Asia/Hong_Kong'});
    document.getElementById('lastUpdate').textContent = d.ts||'--:--';
    var t=d.tasks||{}; document.getElementById('hTasks').textContent=t.total||0; document.getElementById('hOverdue').textContent=t.overdue||0; document.getElementById('hUrgent').textContent=t.q1_count||0;
    var sys=d.system||{}; document.getElementById('hCpu').textContent=(sys.cpu||'--')+'%';

    // Servants status
    var a=d.agents||{};
    ['fighter','work','person'].forEach(function(k){
      var key=k==='fighter'?'main':k;
      var ag=(a[key]||{});
      var el=document.getElementById(k+'Status');
      var dot=document.getElementById(k+'Dot');
      if(ag.online){
        el.textContent='Online';
        el.style.color='var(--accent)';
        dot.style.background=k==='fighter'?'var(--orange)':k==='work'?'var(--blue)':'var(--pink)';
      } else {
        el.textContent='Offline since '+(ag.last_heartbeat||'--:--');
        el.style.color='var(--red)';
        dot.style.background='var(--red)';
      }
    });

    // AI Suggestions
    fetch('/api/intel-summary?_='+Date.now()).then(function(r){return r.json()}).then(function(d2){
      var sug=document.getElementById('homeSuggestions');
      if(d2.ok && d2.summary){
        sug.innerHTML = '<div style="font-size:15px;color:var(--label);line-height:1.6">' + esc(d2.summary) + '</div>';
      } else {
        renderFallbackSuggestions(d.tasks||{});
      }
    }).catch(function(){
      renderFallbackSuggestions(d.tasks||{});
    });
  }).catch(function(){});
}

function renderFallbackSuggestions(t){
  var sug=document.getElementById('homeSuggestions');
  var items=[];
  if(t.overdue>0) items.push('⚠️ Overdue <strong>'+t.overdue+' tasks</strong> — check <a href="/tasks" style="color:var(--accent)">Tasks</a>');
  if(t.q1_count>0) items.push('🎯 <strong>'+t.q1_count+' urgent</strong> tasks waiting');
  if(t.due_today>0) items.push('📅 <strong>'+t.due_today+' tasks due today</strong>');
  sug.innerHTML = items.length ? items.map(function(x){return '<div style="padding:6px 0;border-bottom:0.5px solid var(--separator);font-size:15px;line-height:1.5">'+x+'</div>';}).join('') : '<div style="text-align:center;padding:10px;color:var(--accent);font-size:15px">✅ All clear — no pressing items</div>';
}

loadHome();

function toggleNotices(){
  var bar=document.getElementById('noticesBar');
  if(bar.style.display==='none'||!bar.style.display){
    bar.style.display='block';
    fetch('/api/notices').then(function(r){return r.json()}).then(function(d){
      var el=document.getElementById('noticesList');
      if(!d.ok||!d.items||!d.items.length){el.innerHTML='<div style="text-align:center;padding:10px;color:var(--secondary-label)">No notices</div>';return;}
      el.innerHTML=d.items.map(function(n){return '<div style="padding:8px 0;border-bottom:0.5px solid var(--separator);font-size:15px;line-height:1.5"><span style="color:var(--accent);font-weight:600">'+esc(n.source)+'</span> '+esc(n.text)+' <span style="color:var(--secondary-label);font-size:13px">'+n.time+'</span></div>';}).join('');
    }).catch(function(){});
  }else{bar.style.display='none';}
}

/* WAAPI card animation */
setTimeout(function(){
  var els = document.querySelectorAll('.ios-stat, .ios-row, .ios-group');
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  els.forEach(function(el, i) {
    if (!el.dataset.animated) {
      el.dataset.animated = '1';
      el.animate([
        { opacity: '0', transform: 'translateY(16px)' },
        { opacity: '1', transform: 'translateY(0)' }
      ], { duration: 700, easing: 'ease-out', delay: i * 60 });
    }
  });
}, 50);
</script>
</body></html>
