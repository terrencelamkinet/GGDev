<!DOCTYPE html><html lang="zh-HK"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"><title>GG Profile</title><link rel="stylesheet" href="/static/styles.css"></head><body>
<div class="app-shell">
<header class="top-bar"><svg class="icon-lg" style="color:var(--accent)"><use href="/static/icons.svg#icon-user"/></svg><div><h1 class="page-title">Profile</h1><span class="page-subtitle">Terrence Lam</span></div></header>
<main class="scroll-content">
  <div class="card">
    <div style="display:flex;align-items:center;gap:12px">
      <div style="width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--orange));display:flex;align-items:center;justify-content:center">
        <svg class="icon-lg" style="color:#fff"><use href="/static/icons.svg#icon-user"/></svg>
      </div>
      <div>
        <div style="font-weight:700;font-size:16px">Terrence Lam</div>
        <div style="font-size:12px;color:var(--text-dim)">Pre-Sales Consultant &middot; AIA</div>
      </div>
    </div>
  </div>
  <div class="card" style="border-left:3px solid var(--gold-sub)">
    <div class="card-header"><h2>Personal</h2></div>
    <div style="font-size:13px;color:var(--text-muted);line-height:1.8">
      <div>Location: Hong Kong (HKT UTC+8)</div>
      <div>Family: Aggie + 2 children</div>
      <div>Church: Worship Leader</div>
      <div>Vehicle: Toyota Sienta Hybrid 2018</div>
    </div>
  </div>
  <div class="section-title">System</div>
  <div class="card" id="sysInfo">
    <div style="font-size:13px;color:var(--text-dim)">Loading...</div>
  </div>
</main>
<nav class="bottom-nav">
  <a href="/home" class="nav-item"><svg class="icon-nav"><use href="/static/icons.svg#icon-house"/></svg><span>Home</span></a>
  <a href="/tasks" class="nav-item"><svg class="icon-nav"><use href="/static/icons.svg#icon-list"/></svg><span>Tasks</span></a>
  <a href="/intel" class="nav-item"><svg class="icon-nav"><use href="/static/icons.svg#icon-brain"/></svg><span>Intel</span></a>
  <a href="/agents" class="nav-item"><svg class="icon-nav"><use href="/static/icons.svg#icon-server"/></svg><span>Agents</span></a>
  <a href="/profile" class="nav-item active"><svg class="icon-nav"><use href="/static/icons.svg#icon-user"/></svg><span>Profile</span></a>
</nav>
</div>
<script>
fetch('/api/data?_='+Date.now()).then(r=>r.json()).then(function(d){
  var el=document.getElementById('sysInfo');
  if(el) el.innerHTML='<div style="font-size:13px;color:var(--text-muted);line-height:1.8">'+
    '<div>CPU: <strong>'+(d.system?d.system.cpu:'--')+'%</strong></div>'+
    '<div>Memory: <strong>'+(d.system?d.system.mem:'--')+'%</strong></div>'+
    '<div>Disk: <strong>'+(d.system?d.system.disk:'--')+'%</strong></div>'+
    '<div>Mode: <strong>Local + PG</strong></div>'+
    '<div>Updated: <strong>'+(d.ts||'--:--')+'</strong></div></div>';
}).catch(function(){});
</script>
</body></html>
