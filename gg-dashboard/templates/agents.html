<!DOCTYPE html><html lang="zh-HK"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"><title>GG Agents</title><link rel="stylesheet" href="/static/styles.css?v=1.1"></head><body>
<div class="app-shell">
<header class="top-bar"><svg class="icon-lg" style="color:var(--accent)"><use href="/static/icons.svg#icon-server"/></svg><div><h1 class="page-title">Agent Center</h1><span class="page-subtitle">Three AI Servants</span></div><span class="time-label" id="lastUpdate">--:--</span></header>
<main class="scroll-content">
  <div class="col3" id="agentCards">
    <div class="card" onclick="location.href='/agents/fighter'" style="cursor:pointer;border-top:3px solid var(--orange)">
      <div class="card-header"><h2>Fighter</h2><span class="tag" id="agFighterStatus">● Online</span></div>
      <div class="ai-thought" id="agFighterThought">The Protector</div>
    </div>
    <div class="card" onclick="location.href='/agents/work'" style="cursor:pointer;border-top:3px solid var(--blue)">
      <div class="card-header"><h2>Work</h2><span class="tag" id="agWorkStatus">● Online</span></div>
      <div class="ai-thought" id="agWorkThought">The Builder</div>
    </div>
    <div class="card" onclick="location.href='/agents/person'" style="cursor:pointer;border-top:3px solid var(--pink)">
      <div class="card-header"><h2>Person</h2><span class="tag" id="agPersonStatus">● Online</span></div>
      <div class="ai-thought" id="agPersonThought">The Soul</div>
    </div>
  </div>
  <div class="section-title">Right Now</div>
  <div class="card" id="agThoughts"><div style="color:var(--text-dim);font-size:12px">Loading...</div></div>
  <div class="section-title">Tracked Needs</div>
  <div class="card" id="agNeeds"><div style="color:var(--text-dim);font-size:12px">Loading...</div></div>
</main>
<nav class="bottom-nav">
  <a href="/home" class="nav-item"><svg class="icon-nav"><use href="/static/icons.svg#icon-house"/></svg><span>Home</span></a>
  <a href="/tasks" class="nav-item"><svg class="icon-nav"><use href="/static/icons.svg#icon-list"/></svg><span>Tasks</span></a>
  <a href="/intel" class="nav-item"><svg class="icon-nav"><use href="/static/icons.svg#icon-brain"/></svg><span>Intel</span></a>
  <a href="/agents" class="nav-item active"><svg class="icon-nav"><use href="/static/icons.svg#icon-server"/></svg><span>Agents</span></a>
  <a href="/profile" class="nav-item"><svg class="icon-nav"><use href="/static/icons.svg#icon-user"/></svg><span>Profile</span></a>
</nav>
</div>
<script>
fetch('/api/data?_='+Date.now()).then(r=>r.json()).then(function(d){
  var a=d.agents||{};
  function setTag(id,v){var e=document.getElementById(id);if(e){e.textContent=v?'● Online':'● Offline';e.className='tag'+(v?' green':' peach');}}
  setTag('agFighterStatus',a.main&&a.main.online);setTag('agWorkStatus',a.work&&a.work.online);setTag('agPersonStatus',a.person&&a.person.online);
  var ft=document.getElementById('agFighterThought');if(ft)ft.textContent=(a.main&&a.main.thoughts)||'Idle';
  var wt=document.getElementById('agWorkThought');if(wt)wt.textContent=(a.work&&a.work.thoughts)||'On standby';
  var pt=document.getElementById('agPersonThought');if(pt)pt.textContent=(a.person&&a.person.thoughts)||'Ready';
  document.getElementById('lastUpdate').textContent=d.ts||'--:--';
}).catch(function(){});
</script>
</body></html>
