<!DOCTYPE html><html lang="zh-HK"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"><title>GG Agent | {{ name }}</title><link rel="stylesheet" href="/static/styles.css"></head><body>
<div class="app-shell">
<header class="top-bar"><svg class="icon-lg" style="color:var(--accent)"><use href="/static/icons.svg#icon-server"/></svg><div><h1 class="page-title">{{ name|capitalize }}</h1><span class="page-subtitle">AI Servant</span></div><span class="time-label" id="lastUpdate">--:--</span></header>
<main class="scroll-content">
  <div class="card" id="agDetail">
    <div id="agDetailContent" style="font-size:13px;color:var(--text-dim);line-height:1.6">Loading agent data...</div>
  </div>
  <div class="section-title">Recent Activity</div>
  <div class="card" id="agActivity"><div style="font-size:12px;color:var(--text-dim)">Loading...</div></div>
</main>
<nav class="bottom-nav">
  <a href="/home" class="nav-item"><svg class="icon-nav"><use href="/static/icons.svg#icon-house"/></svg><span>Home</span></a>
  <a href="/tasks" class="nav-item"><svg class="icon-nav"><use href="/static/icons.svg#icon-list"/></svg><span>Tasks</span></a>
  <a href="/intel" class="nav-item"><svg class="icon-nav"><use href="/static/icons.svg#icon-brain"/></svg><span>Intel</span></a>
  <a href="/agents" class="nav-item"><svg class="icon-nav"><use href="/static/icons.svg#icon-server"/></svg><span>Agents</span></a>
  <a href="/profile" class="nav-item"><svg class="icon-nav"><use href="/static/icons.svg#icon-user"/></svg><span>Profile</span></a>
</nav>
</div>
<script>
fetch('/api/data?_='+Date.now()).then(r=>r.json()).then(function(d){
  var name = window.location.pathname.split('/').pop() || 'fighter';
  var key = name === 'fighter' ? 'main' : name;
  var a = (d.agents||{})[key] || {};
  var colors = {fighter:'var(--orange)',work:'var(--blue)',person:'var(--pink)'};
  var el = document.getElementById('agDetailContent');
  if (el) {
    el.innerHTML = '<div style="border-left:3px solid '+(colors[name]||'var(--accent)')+';padding-left:10px">'+
      '<div style="font-size:18px;font-weight:700;margin-bottom:4px">' + (name|capitalize) + '</div>'+
      '<div>Status: <strong>' + (a.online?'Online':'Offline') + '</strong></div>'+
      '<div>CPU: <strong>'+(a.cpu||'--')+'%</strong> &middot; MEM: <strong>'+(a.mem||'--')+'%</strong></div>'+
      '<div>Uptime: <strong>'+(a.uptime||'--')+'</strong></div>'+
      (a.thoughts ? '<div style="margin-top:8px;font-style:italic;color:var(--text-muted)">' + a.thoughts + '</div>' : '')+
    '</div>';
  }
}).catch(function(){});
</script>
</body></html>
