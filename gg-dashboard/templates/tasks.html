<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
  <title>GG Platform | Tasks</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
<div class="app-shell">
  <!-- Header -->
  <header class="top-bar">
    <svg class="icon-lg" style="color:var(--accent)"><use href="/static/icons.svg#icon-list"/></svg>
    <div>
      <h1 class="page-title">Tasks</h1>
      <span class="page-subtitle">Notion Task Center</span>
    </div>
    <span class="time-label" id="lastUpdate">--:--</span>
  </header>

  <main class="scroll-content">
    <!-- Summary cards -->
    <div class="stat-grid-4">
      <div class="stat-card"><div class="stat-value green" id="taskTotal">--</div><div class="stat-label">Active</div></div>
      <div class="stat-card"><div class="stat-value peach" id="taskOverdue">0</div><div class="stat-label">Overdue</div></div>
      <div class="stat-card"><div class="stat-value gold" id="taskDueToday">0</div><div class="stat-label">Due Today</div></div>
      <div class="stat-card"><div class="stat-value accent" id="taskQ1">0</div><div class="stat-label">Urgent</div></div>
    </div>

    <!-- Filters -->
    <div class="filter-row" id="filterRow">
      <button class="filter-chip active" data-f="all" onclick="filterTasks(this)">All</button>
      <button class="filter-chip" data-f="Work" onclick="filterTasks(this)">Work</button>
      <button class="filter-chip" data-f="Personal" onclick="filterTasks(this)">Personal</button>
      <button class="filter-chip" data-f="Learning" onclick="filterTasks(this)">Learning</button>
    </div>

    <!-- Task list -->
    <div id="taskList" class="card-stack"></div>
  </main>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <a href="/home" class="nav-item"><svg class="icon-nav"><use href="/static/icons.svg#icon-house"/></svg><span>Home</span></a>
    <a href="/tasks" class="nav-item active"><svg class="icon-nav"><use href="/static/icons.svg#icon-list"/></svg><span>Tasks</span></a>
    <a href="/intel" class="nav-item"><svg class="icon-nav"><use href="/static/icons.svg#icon-brain"/></svg><span>Intel</span></a>
    <a href="/agents" class="nav-item"><svg class="icon-nav"><use href="/static/icons.svg#icon-server"/></svg><span>Agents</span></a>
    <a href="/profile" class="nav-item"><svg class="icon-nav"><use href="/static/icons.svg#icon-user"/></svg><span>Profile</span></a>
  </nav>
</div>

<script src="/static/app.js"></script>
<script>
var _allTasks = [], _activeFilter = 'all', _expandedTask = null;

function filterTasks(btn) {
  _activeFilter = btn ? btn.getAttribute('data-f') || 'all' : 'all';
  _expandedTask = null;
  document.querySelectorAll('.filter-chip').forEach(function(c){c.classList.remove('active')});
  if (btn) btn.classList.add('active');
  renderTasks();
}

function toggleDetail(idx) {
  _expandedTask = _expandedTask === idx ? null : idx;
  renderTasks();
}

function doAction(pageId, action, value, btn) {
  if (!pageId) { showToast('Read-only — no Notion link', 'var(--peach)'); return; }
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>'; }
  fetch('/api/task/action', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({page_id:pageId, action:action, value:value||''})
  }).then(function(r){return r.json()}).then(function(resp){
    if (resp.ok) { showToast(resp.message||'Done','var(--green)'); setTimeout(loadTasks,1000); }
    else { showToast(resp.error||'Failed','var(--peach)'); if(btn)btn.disabled=false; }
  }).catch(function(){showToast('Network error','var(--peach)');if(btn)btn.disabled=false;});
}

function loadTasks() {
  fetch('/api/data?_='+Date.now()).then(function(r){return r.json()}).then(function(d){
    var t = d.tasks || {};
    document.getElementById('taskTotal').textContent = t.total || 0;
    document.getElementById('taskOverdue').textContent = t.overdue || 0;
    document.getElementById('taskDueToday').textContent = t.due_today || 0;
    document.getElementById('taskQ1').textContent = t.q1_count || 0;
    document.getElementById('lastUpdate').textContent = d.ts || '--:--';
    if (document.getElementById('headerTime')) document.getElementById('headerTime').textContent = d.ts || '--:--';
    _allTasks = t.items || [];
    renderTasks();
  }).catch(function(){});
}

function renderTasks() {
  var el = document.getElementById('taskList');
  if (!el) return;
  var items = _activeFilter === 'all' ? _allTasks : _allTasks.filter(function(t){return (t.area||'').indexOf(_activeFilter)>=0});
  if (!items.length) {
    el.innerHTML = '<div class="empty-state"><svg class="icon-state accent"><use href="/static/icons.svg#icon-list"/></svg><p>No ' + (_activeFilter==='all'?'tasks':_activeFilter+' tasks') + '</p></div>';
    return;
  }
  var today = new Date(); var todayStr = today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0');
  el.innerHTML = items.map(function(t,i){
    var expanded = _expandedTask === i;
    var p = t.priority || ''; var pc = p.indexOf('Q1')>=0?'var(--orange)':p.indexOf('Q2')>=0?'var(--gold)':p.indexOf('Q3')>=0?'var(--accent)':'var(--border)';
    var d = t.due||''; var dl='',dc=''; if(d){if(d<todayStr){dl='Overdue '+d;dc='var(--peach)'}else if(d===todayStr){dl='Today';dc='var(--gold)'}else{dl=d;dc='var(--text-dim)'}}
    var s = t.status||''; var sd = s==='In progress'?'var(--gold)':s==='Done'?'var(--green)':'var(--text-dim)';
    var notes = t.notes||''; var ns = notes.substring(0,80)+(notes.length>80?'...':'');
    return '<div class="task-card" style="border-left-color:'+pc+'" onclick="toggleDetail('+i+')">'+
      '<div class="task-header"><div class="task-title">'+esc(t.title)+'</div>'+
        '<div style="display:flex;gap:4px;align-items:center">'+
          '<span class="prio-badge" style="background:'+pc+'20;color:'+pc+'">'+(p.indexOf('Q1')>=0?'U':p.indexOf('Q2')>=0?'S':p.indexOf('Q3')>=0?'D':'')+'</span>'+
          '<svg class="icon-xs" style="color:var(--text-dim);transform:rotate('+(expanded?'180':'0')+'deg)"><use href="/static/icons.svg#icon-chevron-right"/></svg>'+
        '</div></div>'+
      '<div class="task-meta"><span class="status-dot" style="background:'+sd+'"></span><span>'+s+'</span>'+
        (dl?'<span style="color:'+dc+';font-weight:'+(d===todayStr?'700':'400')+'">'+dl+'</span>':'')+
      '</div>'+
      (!expanded && ns ? '<div class="task-notes">'+esc(ns)+'</div>' : '')+
      (expanded ? '<div class="task-detail">'+
        (notes?'<div class="notes-box">'+esc(notes)+'</div>':'')+
        '<div class="action-row">'+
          (s!=='Done'?'<button class="btn green" onclick="event.stopPropagation();doAction(\''+(t.page_id||'')+'\',\'mark_done\',\'\',this)"><svg class="icon-sm"><use href="/static/icons.svg#icon-check"/></svg> Done</button>':'')+
          (s!=='In progress'?'<button class="btn gold" onclick="event.stopPropagation();doAction(\''+(t.page_id||'')+'\',\'set_status\',\'In progress\',this)">Running</button>':'')+
          (s!=='Not started'?'<button class="btn ghost" onclick="event.stopPropagation();doAction(\''+(t.page_id||'')+'\',\'set_status\',\'Not started\',this)">Reset</button>':'')+
        '</div>'+
        '<div class="detail-footer">'+
          (t.page_id?'<svg class="icon-xs"><use href="/static/icons.svg#icon-refresh"/></svg> Notion linked':'<svg class="icon-xs"><use href="/static/icons.svg#icon-server"/></svg> Local')+
          (t.last_edited?' &middot; '+(t.last_edited.substring(0,10)):'')+
        '</div>'+
      '</div>' : '')+
    '</div>';
  }).join('');
}

loadTasks();
setInterval(loadTasks, 30000);
</script>
</body>
</html>
