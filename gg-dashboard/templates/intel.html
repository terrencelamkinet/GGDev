<!DOCTYPE html><html lang="zh-HK"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="default"><meta name="apple-mobile-web-app-title" content="GG Platform"><title>GG Intel</title><link rel="stylesheet" href="/static/styles.css?v=1.1"></head><body>
<div class="app-shell">
<header class="top-bar"><svg class="icon-lg" style="color:var(--accent)"><use href="/static/icons.svg#icon-brain"/></svg><div><h1 class="page-title">Intelligence</h1><span class="page-subtitle">GG Family Hub</span></div><span class="time-label" id="lastUpdate">--:--</span></header>
<main class="scroll-content">

  <!-- Research Bar -->
  <div class="card" style="padding:8px 12px">
    <div style="display:flex;gap:8px;align-items:center">
      <input id="researchInput" type="text" placeholder="Ask Perplexity..." onkeydown="if(event.key==='Enter') runResearch()" style="flex:1;border:none;background:var(--surface);padding:10px 14px;border-radius:12px;font-size:17px;outline:none;color:var(--text)">
      <button id="researchBtn" onclick="runResearch()" style="background:var(--accent);border:none;border-radius:10px;padding:12px 16px;min-height:44px;cursor:pointer;font-size:13px;font-weight:600;color:#fff;white-space:nowrap">Search</button>
      <button id="researchDeepBtn" onclick="toggleDeep()" style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;min-height:44px;cursor:pointer;font-size:11px;color:var(--text-dim);white-space:nowrap">Quick</button>
    </div>
    <div id="researchStatus" style="font-size:11px;color:var(--text-dim);margin-top:6px;display:none"></div>
  </div>
  <div id="researchResult" style="display:none"></div>

  <!-- GG Voices -->
  <div class="section-title">GG Voices</div>
  <div class="col3" id="ggVoices">
    <div class="card"><div style="font-size:11px;color:var(--text-dim)">Loading...</div></div>
  </div>

  <!-- Discoveries -->
  <div class="section-title">Discoveries</div>
  <div class="card" id="discoveries"><div style="font-size:12px;color:var(--text-dim)">Collecting intelligence...</div></div>

  <!-- Activity Stream -->
  <div class="section-title">Activity Stream</div>
  <div class="card" id="activityStream"><div style="font-size:12px;color:var(--text-dim)">Loading...</div></div>
</main>
<nav class="bottom-nav">
  <a href="/home" class="nav-item"><svg class="icon-nav" role="img" aria-label="Home"><use href="/static/icons.svg#icon-house"/></svg><span>Home</span></a>
  <a href="/tasks" class="nav-item"><svg class="icon-nav" role="img" aria-label="Tasks"><use href="/static/icons.svg#icon-list"/></svg><span>Tasks</span></a>
  <a href="/intel" class="nav-item active"><svg class="icon-nav" role="img" aria-label="Intel"><use href="/static/icons.svg#icon-brain"/></svg><span>Intel</span></a>
  <a href="/agents" class="nav-item"><svg class="icon-nav" role="img" aria-label="Agents"><use href="/static/icons.svg#icon-server"/></svg><span>Agents</span></a>
  <a href="/profile" class="nav-item"><svg class="icon-nav" role="img" aria-label="Profile"><use href="/static/icons.svg#icon-user"/></svg><span>Profile</span></a>
</nav>
</div>

<script>
// Research mode
var researchMode = 'quick';
function toggleDeep(){
  researchMode = researchMode === 'quick' ? 'deep' : 'quick';
  var btn = document.getElementById('researchDeepBtn');
  btn.textContent = researchMode === 'deep' ? 'Deep' : 'Quick';
  btn.style.background = researchMode === 'deep' ? 'var(--gold)' : 'var(--surface)';
  btn.style.color = researchMode === 'deep' ? '#000' : 'var(--text-dim)';
}
function runResearch(){
  var input = document.getElementById('researchInput');
  var q = input.value.trim();
  if(!q) return;

  var status = document.getElementById('researchStatus');
  var result = document.getElementById('researchResult');
  var btn = document.getElementById('researchBtn');

  status.style.display = 'block';
  status.textContent = researchMode === 'deep' ? '🔍 Deep research in progress (30-60s)...' : '🔍 Researching...';
  btn.disabled = true;
  btn.style.opacity = '0.5';
  result.style.display = 'none';

  fetch('/api/research', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({query: q, mode: researchMode})
  }).then(function(r){return r.json()}).then(function(d){
    btn.disabled = false;
    btn.style.opacity = '1';
    status.style.display = 'none';
    if(d.ok){
      var c = d.content || 'No response';
      var citations = d.citations || [];
      var header = researchMode === 'deep' ? '🔬 Deep Research Result' : '🔍 Research Result';
      var citeHtml = citations.length ? '<div style="margin-top:8px;font-size:11px;color:var(--text-dim)">Sources: ' + citations.slice(0,3).map(function(u){return '<a href="'+esc(u)+'" target="_blank" style="color:var(--accent)">link</a>'}).join(' ') + (citations.length>3?' +'+(citations.length-3)+' more':'') + '</div>' : '';
      result.innerHTML = '<div class="card" style="border-left:3px solid var(--accent)"><div class="card-header"><h2>'+header+'</h2><span class="tag green">'+(d.model||'sonar-pro')+'</span></div><div style="font-size:13px;color:var(--text-muted);line-height:1.7;white-space:pre-wrap">'+esc(c)+'</div>'+citeHtml+'</div>';
      result.style.display = 'block';
      // Also refresh insights page
      loadInsights();
    } else {
      status.textContent = '❌ Error: ' + esc(d.error || 'Unknown');
      status.style.display = 'block';
      status.style.color = 'var(--peach)';
    }
  }).catch(function(err){
    btn.disabled = false;
    btn.style.opacity = '1';
    status.textContent = '❌ Network error';
    status.style.display = 'block';
    status.style.color = 'var(--peach)';
  });
}

function loadInsights(){
  fetch('/api/insights?_='+Date.now()).then(function(r){return r.json()}).then(function(d){
    var e = d.entries || [];

    // GG Voices — latest per source (fighter, work, person)
    var voices = document.getElementById('ggVoices');
    if(voices){
      var voicesData = {};
      e.forEach(function(x){
        if(!voicesData[x.source]) voicesData[x.source] = x;
      });
      var order = {fighter: 'var(--orange)', work: 'var(--blue)', person: 'var(--pink)'};
      var srcNames = {fighter:'Fighter', work:'Work', person:'Person'};
      var html = '';
      var count = 0;
      for(var src in order){
        var v = voicesData[src];
        if(v){
          html += '<div class="card" style="border-top:3px solid '+order[src]+'"><div class="card-header"><h2>'+ (srcNames[src]||src) +'</h2><span class="tag lavender">'+(v.ts||'').substring(11,16)+'</span></div><div style="font-size:12px;color:var(--text-muted)">'+esc(v.msg||'')+'</div></div>';
        } else {
          html += '<div class="card" style="border-top:3px solid '+order[src]+'"><div class="card-header"><h2>'+ (srcNames[src]||src) +'</h2><span class="tag">idle</span></div><div style="font-size:12px;color:var(--text-dim)">No recent intel</div></div>';
        }
        count++;
      }
      voices.innerHTML = html;
    }

    // Discoveries
    var dis = document.getElementById('discoveries');
    if(dis){
      var disc = e.filter(function(x){return x.type==='discovery'||x.type==='trend'||x.type==='research'}).slice(0,10);
      if(disc.length){
        dis.innerHTML = disc.map(function(x){
          var badge = x.type==='research' ? '<span class="tag green" style="margin-right:6px">Research</span>' : '';
          return '<div class="activity-item"><span class="activity-dot" style="background:var(--accent)"></span><span class="activity-text">'+badge+'<strong>'+esc(x.msg||'')+'</strong><br><span style="font-size:11px;color:var(--text-dim)">'+(x.ts||'')+'</span></span></div>';
        }).join('');
      } else {
        dis.innerHTML = '<div style="text-align:center;padding:12px;color:var(--text-dim)"><p>No discoveries yet — collector runs every 15min</p></div>';
      }
    }

    // Activity Stream
    var act = document.getElementById('activityStream');
    if(act){
      var recent = e.slice(-15).reverse();
      if(recent.length){
        act.innerHTML = recent.map(function(x){
          var c = {'fighter':'var(--orange)','work':'var(--blue)','person':'var(--pink)','perplexity':'var(--accent)','system':'var(--text-dim)'};
          return '<div class="activity-item"><span class="activity-dot" style="background:'+(c[x.source]||'var(--text-dim)')+'"></span><span class="activity-text">'+esc(x.msg||'')+'</span><span class="activity-time">'+(x.ts||'').substring(11,16)+'</span></div>';
        }).join('');
      } else {
        act.innerHTML = '<div style="text-align:center;padding:12px;color:var(--text-dim)">Awaiting first data collection...</div>';
      }
    }

    // Update timestamp
    document.getElementById('lastUpdate').textContent = e.length ? (e[0].ts||'').substring(11,16)||'--:--' : '--:--';
  }).catch(function(){});
}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&#60;').replace(/>/g,'&#62;').replace(/\n/g,'<br>')}

// Initial load
loadInsights();
</script>
</body></html>
