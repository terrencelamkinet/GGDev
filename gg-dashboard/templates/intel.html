<!DOCTYPE html><html lang="zh-HK"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"><title>GG Intel</title><link rel="stylesheet" href="/static/styles.css"></head><body>
<div class="app-shell">
<header class="top-bar"><svg class="icon-lg" style="color:var(--accent)"><use href="/static/icons.svg#icon-brain"/></svg><div><h1 class="page-title">Intelligence</h1><span class="page-subtitle">GG Family Hub</span></div><span class="time-label">--:--</span></header>
<main class="scroll-content">
  <div class="section-title">GG Voices</div>
  <div class="col3" id="ggVoices">
    <div class="card"><div style="font-size:11px;color:var(--text-dim)">Loading...</div></div>
  </div>
  <div class="section-title">Discoveries</div>
  <div class="card" id="discoveries"><div style="font-size:12px;color:var(--text-dim)">Collecting intelligence...</div></div>
  <div class="section-title">Activity Stream</div>
  <div class="card" id="activityStream"><div style="font-size:12px;color:var(--text-dim)">Loading...</div></div>
</main>
<nav class="bottom-nav">
  <a href="/home" class="nav-item"><svg class="icon-nav"><use href="/static/icons.svg#icon-house"/></svg><span>Home</span></a>
  <a href="/tasks" class="nav-item"><svg class="icon-nav"><use href="/static/icons.svg#icon-list"/></svg><span>Tasks</span></a>
  <a href="/intel" class="nav-item active"><svg class="icon-nav"><use href="/static/icons.svg#icon-brain"/></svg><span>Intel</span></a>
  <a href="/agents" class="nav-item"><svg class="icon-nav"><use href="/static/icons.svg#icon-server"/></svg><span>Agents</span></a>
  <a href="/profile" class="nav-item"><svg class="icon-nav"><use href="/static/icons.svg#icon-user"/></svg><span>Profile</span></a>
</nav>
</div>
<script>
fetch('/api/insights?_='+Date.now()).then(r=>r.json()).then(function(d){
  var e=d.entries||[];
  var dis=document.getElementById('discoveries');
  if(dis){
    var disc=e.filter(function(x){return x.type==='discovery'||x.type==='trend'}).slice(0,8);
    if(disc.length) disc.innerHTML='<div style="font-size:12px;color:var(--text-dim)">'+disc.map(function(x){return '<div class="activity-item"><span class="activity-dot" style="background:var(--accent)"></span><span class="activity-text"><strong>'+esc(x.msg||'')+'</strong><br>'+ (x.ts||'')+'</span></div>';}).join('')+'</div>';
    else dis.innerHTML='<div style="text-align:center;padding:12px;color:var(--text-dim)"><p>No discoveries yet — collector runs every 15min</p></div>';
  }
  var act=document.getElementById('activityStream');
  if(act){
    var recent=e.slice(-15).reverse();
    if(recent.length) act.innerHTML=recent.map(function(x){
      var c={'fighter':'var(--orange)','work':'var(--blue)','person':'var(--pink)','system':'var(--accent)'};
      return '<div class="activity-item"><span class="activity-dot" style="background:'+(c[x.source]||'var(--text-dim)')+'"></span><span class="activity-text">'+esc(x.msg||'')+'</span><span class="activity-time">'+(x.ts||'').substring(11,16)+'</span></div>';
    }).join('');
    else act.innerHTML='<div style="text-align:center;padding:12px;color:var(--text-dim)">Awaiting first data collection...</div>';
  }
}).catch(function(){});
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&#60;').replace(/>/g,'&#62;')}
</script>
</body></html>
