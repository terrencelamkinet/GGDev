<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GG Access Launcher</title>
<style>
body { background: #1a1a2e; color: #e0e0e0; font-family: system-ui; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; text-align: center; flex-direction: column; gap: 20px; padding: 20px; }
.btn { background: #00d4aa; color: #0a0a1a; border: none; padding: 16px 40px; border-radius: 12px; font-size: 18px; cursor: pointer; font-weight: bold; transition: all 0.2s; }
.btn:hover { background: #00ffcc; transform: scale(1.05); }
.btn:disabled { opacity: 0.5; cursor: wait; }
.loading { color: #888; font-size: 14px; }
.error { color: #ff6b6b; }
.success { color: #00d4aa; }
h1 { margin: 0; font-size: 24px; }
.sub { color: #888; font-size: 13px; }
</style>
</head>
<body>
<div>
  <h1>🦾 GG Access Launcher</h1>
  <p class="sub">Click to access GG Dashboard</p>
  <div id="status"></div>
  <button class="btn" id="launchBtn" onclick="launch()">🚀 Launch Dashboard</button>
</div>
<script>
const CLIENT_ID = 'e4ed4be6ed5d8ca2b52a2105cc44e11f.access';
const CLIENT_SECRET = '6c625cc482125f506318036596a423555a91d8d99bdec96dd892bce0d519c185';

async function launch() {
  const btn = document.getElementById('launchBtn');
  const status = document.getElementById('status');
  btn.disabled = true;
  status.innerHTML = '🔄 Connecting...';
  status.className = 'loading';

  try {
    const resp = await fetch('/gg-dashboard/', {
      headers: {
        'CF-Access-Client-Id': CLIENT_ID,
        'CF-Access-Client-Secret': CLIENT_SECRET
      }
    });
    
    if (resp.ok) {
      status.innerHTML = '✅ Authenticated!';
      status.className = 'success';
      // Navigate to dashboard by clicking a hidden link
      window.location.href = '/gg-dashboard/';
    } else if (resp.status === 302 || resp.status === 307) {
      status.innerHTML = '✅ Redirecting...';
      status.className = 'success';
      window.location.href = '/gg-dashboard/';
    } else {
      status.innerHTML = '❌ Access denied. Try again.';
      status.className = 'error';
      btn.disabled = false;
    }
  } catch (e) {
    status.innerHTML = '❌ Error: ' + e.message;
    status.className = 'error';
    btn.disabled = false;
  }
}
</script>
</body>
</html>
