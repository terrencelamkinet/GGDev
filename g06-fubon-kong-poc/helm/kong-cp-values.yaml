# Fubon HK Kong API Gateway PoC - Kong Control Plane values
# Platform: Red Hat OpenShift UAT, self-managed Kong Gateway hybrid mode
# Chart: kong/kong 3.2.0
# Image: kong/kong-gateway:3.14
#
# Secrets expected in namespace kong-cp-uat:
# - kong-enterprise-license: key "license"
# - kong-db-secret: key "password"
# - kong-admin-secret: key "password"
# - kong-session-config: key "admin_gui_session_conf"
# - kong-cluster-cert: keys "tls.crt", "tls.key"

fullnameOverride: kong-cp

deployment:
  kong:
    enabled: true
  serviceAccount:
    create: false
    name: kong-sa
    automountServiceAccountToken: false

ingressController:
  enabled: false
  rbac:
    create: false

image:
  repository: kong/kong-gateway
  tag: "3.14"
  pullPolicy: IfNotPresent

enterprise:
  enabled: true
  license_secret: kong-enterprise-license
  vitals:
    enabled: false
  portal:
    enabled: false
  rbac:
    enabled: true
    admin_gui_auth: basic-auth
    session_conf_secret: kong-session-config

env:
  admin_gui_auth: basic-auth
  role: control_plane
  database: postgres
  pg_host: "__POSTGRES_HOST_OR_IP__"
  pg_port: "5432"
  pg_database: kong
  pg_user: kong
  pg_password:
    valueFrom:
      secretKeyRef:
        name: kong-db-secret
        key: password
  password:
    valueFrom:
      secretKeyRef:
        name: kong-admin-secret
        key: password

  cluster_mtls: shared
  cluster_cert: /etc/secrets/kong-cluster-cert/tls.crt
  cluster_cert_key: /etc/secrets/kong-cluster-cert/tls.key
  cluster_listen: "0.0.0.0:8005 ssl"
  cluster_telemetry_listen: "0.0.0.0:8006 ssl"

  admin_gui_url: https://kong-manager.uat.fubonhk.internal
  admin_gui_api_url: https://kong-admin.uat.fubonhk.internal
  admin_listen: "0.0.0.0:8001, 0.0.0.0:8444 ssl"
  admin_gui_listen: "0.0.0.0:8002, 0.0.0.0:8445 ssl"
  status_listen: "0.0.0.0:8100"

  anonymous_reports: "off"
  log_level: info
  nginx_worker_processes: "2"
  proxy_access_log: /dev/stdout
  admin_access_log: /dev/stdout
  admin_gui_access_log: /dev/stdout
  proxy_error_log: /dev/stderr
  admin_error_log: /dev/stderr
  admin_gui_error_log: /dev/stderr

secretVolumes:
  - kong-cluster-cert

admin:
  enabled: true
  type: ClusterIP
  http:
    enabled: true
    servicePort: 8001
    containerPort: 8001
  tls:
    enabled: true
    servicePort: 8444
    containerPort: 8444
    parameters:
      - http2

manager:
  enabled: true
  type: ClusterIP
  http:
    enabled: true
    servicePort: 8002
    containerPort: 8002
  tls:
    enabled: true
    servicePort: 8445
    containerPort: 8445
    parameters:
      - http2

proxy:
  enabled: false

cluster:
  enabled: true
  type: ClusterIP
  tls:
    enabled: true
    servicePort: 8005
    containerPort: 8005

clustertelemetry:
  enabled: true
  type: ClusterIP
  tls:
    enabled: true
    servicePort: 8006
    containerPort: 8006

portal:
  enabled: false

portalapi:
  enabled: false

postgresql:
  enabled: false

replicaCount: 2

resources:
  requests:
    cpu: "2"
    memory: 4Gi
  limits:
    cpu: "2"
    memory: 4Gi

migrations:
  bootstrap: true
  preUpgrade: true
  postUpgrade: true
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

podDisruptionBudget:
  enabled: true
  minAvailable: 1

securityContext:
  seccompProfile:
    type: RuntimeDefault

# OpenShift assigns the runtime UID through SCC. Keeping this disabled avoids
# pinning runAsUser/runAsGroup values that can conflict with restricted SCC.
containerSecurityContext:
  enabled: false
